<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Magical Mirai 2026 · Lyric App · Rico Eriansyah</title>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<script src="https://unpkg.com/textalive-app-api/dist/index.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Kurenaido&family=Noto+Serif+JP:wght@300;400;700&display=swap');

/* ════════════════════════════════════════
   THEME VARIABLES
   body.theme-sun  = Summer / Sunflower — WHITE background
   body.theme-star = Star / Miku       — BLACK background
════════════════════════════════════════ */
body.theme-sun {
  --bg:#ffffff;
  --surface:#f5f0e8;
  --c1:#e8a000;
  --c2:#f5c800;
  --c3:#ff9500;
  --accent:#ff6d00;
  --text:#1a0e00;
  --text-inv:#ffffff;
  --muted:#b89060;
  --ctrl-bg:rgba(255,255,255,0.85);
  --ctrl-border:rgba(232,160,0,0.35);
  --select-bg:rgba(245,240,232,0.95);
  --banner-bg:rgba(255,255,255,0.85);
  --banner-border:rgba(232,160,0,0.3);
  --shadow-col:rgba(232,160,0,0.18);
  --char-active:#ff6d00;
  --char-passed:#c98a20;
  --glow-a:rgba(245,200,0,0.22);
  --glow-b:rgba(255,109,0,0.15);
}
body.theme-star {
  --bg:#000000;
  --surface:#080812;
  --c1:#39c5bb;
  --c2:#0ff0e4;
  --c3:#00fff7;
  --accent:#00e5ff;
  --text:#e8e0ff;
  --text-inv:#000000;
  --muted:#3a4a5a;
  --ctrl-bg:rgba(0,0,0,0.82);
  --ctrl-border:rgba(57,197,187,0.25);
  --select-bg:rgba(8,8,18,0.92);
  --banner-bg:rgba(0,0,0,0.75);
  --banner-border:rgba(57,197,187,0.2);
  --shadow-col:rgba(57,197,187,0.15);
  --char-active:#00fff7;
  --char-passed:#5ee7df;
  --glow-a:rgba(57,197,187,0.2);
  --glow-b:rgba(0,229,255,0.12);
}

/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
body{
  font-family:'Zen Kurenaido','Noto Serif JP',serif;
  background:var(--bg);
  color:var(--text);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  position:relative;
  transition:background 0.7s,color 0.5s;
  cursor:default;
}

/* ════ BACKGROUND LAYERS ════ */
#bg-layer{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  transition:opacity 0.8s;
}
/* Sun: soft warm radial from top — on WHITE */
body.theme-sun #bg-layer{
  background:
    radial-gradient(ellipse 70% 55% at 50% -5%, rgba(255,200,50,0.18) 0%, rgba(255,140,0,0.08) 40%, transparent 70%),
    radial-gradient(ellipse 100% 40% at 50% 110%, rgba(255,160,0,0.07) 0%, transparent 60%);
}
/* Star: pure black with subtle blue nebula */
body.theme-star #bg-layer{
  background:
    radial-gradient(ellipse 60% 50% at 50% -5%, rgba(30,80,120,0.35) 0%, rgba(10,20,60,0.2) 50%, transparent 75%),
    radial-gradient(ellipse 80% 30% at 80% 80%, rgba(57,197,187,0.08) 0%, transparent 60%);
}

/* ── Sun orb ── */
#sun-orb,#sun-rays{
  position:fixed;top:-90px;left:50%;
  transform:translateX(-50%);
  width:240px;height:240px;
  pointer-events:none;z-index:1;
  transition:opacity 0.8s;
}
#sun-orb{
  border-radius:50%;
  background:radial-gradient(circle,#fff7cc 0%,#ffe033 35%,#ff9500 65%,transparent 100%);
  box-shadow:0 0 80px 30px rgba(255,180,0,0.35),0 0 160px 60px rgba(255,140,0,0.15);
  animation:sun-breathe 4s ease-in-out infinite;
}
@keyframes sun-breathe{0%,100%{transform:translateX(-50%) scale(1);}50%{transform:translateX(-50%) scale(1.05);}}
#sun-rays{animation:rays-spin 20s linear infinite;}
#sun-rays::before{
  content:'';position:absolute;top:50%;left:50%;
  width:700px;height:700px;transform:translate(-50%,-50%);
  background:repeating-conic-gradient(from 0deg,rgba(245,200,0,0.04) 0deg 12deg,transparent 12deg 24deg);
  border-radius:50%;
}
@keyframes rays-spin{to{transform:translateX(-50%) rotate(360deg);}}
body.theme-star #sun-orb,body.theme-star #sun-rays{opacity:0;}
body.theme-sun  #sun-orb,body.theme-sun  #sun-rays{opacity:1;}

/* ── Canvases ── */
#petals-canvas{position:fixed;inset:0;z-index:1;pointer-events:none;transition:opacity 0.7s;}
#star-canvas  {position:fixed;inset:0;z-index:1;pointer-events:none;transition:opacity 0.7s;}
#bin-canvas   {position:fixed;inset:0;z-index:1;pointer-events:none;transition:opacity 0.7s;}
body.theme-sun  #petals-canvas{opacity:0.6;} body.theme-sun  #star-canvas{opacity:0;}   body.theme-sun  #bin-canvas{opacity:0.03;}
body.theme-star #petals-canvas{opacity:0;}   body.theme-star #star-canvas{opacity:1;}   body.theme-star #bin-canvas{opacity:0.07;}

/* ── EQ bars ── */
#eq-wrap{
  position:fixed;bottom:0;left:0;right:0;height:44px;
  display:flex;align-items:flex-end;justify-content:center;
  gap:2px;z-index:2;pointer-events:none;
}
.eq-bar{
  width:3px;border-radius:2px 2px 0 0;
  background:linear-gradient(to top,var(--accent),var(--c2));
  height:3px;transition:height 0.09s;
}
body.theme-sun  .eq-bar{opacity:0.35;}
body.theme-star .eq-bar{opacity:0.5;}

/* ── Stage ── */
#stage{position:relative;z-index:3;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}

/* ── Lyric wrap ── */
#lyric-wrap{
  position:absolute;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;gap:0.9rem;padding:5rem 1.2rem 7rem;
}

/* ── Lyric lines ── */
.lyric-line{
  font-size:clamp(1.5rem,7vw,2.4rem);
  font-weight:700;letter-spacing:0.1em;
  text-align:center;width:100%;
  padding:0 0.5rem;
  transition:opacity 0.4s,transform 0.4s,font-size 0.3s,color 0.3s;
  line-height:1.5;word-break:break-word;overflow-wrap:break-word;
}
.lyric-line.current{
  color:var(--text);
  animation:line-in 0.4s cubic-bezier(.22,1,.36,1);
}
body.theme-sun  .lyric-line.current{text-shadow:none;}
body.theme-star .lyric-line.current{text-shadow:none;}

@keyframes line-in{
  0%{opacity:0;transform:translateY(18px) scale(0.92);}
  60%{opacity:1;transform:translateY(-3px) scale(1.02);}
  100%{opacity:1;transform:translateY(0) scale(1);}
}
.lyric-line.prev{
  color:var(--muted);opacity:0.4;
  font-size:clamp(0.85rem,4vw,1.3rem);
  transform:translateY(-0.25em) scale(0.84);
  animation:line-prev 0.35s ease;
}
@keyframes line-prev{0%{opacity:0.8;transform:translateY(0) scale(1);}100%{opacity:0.4;transform:translateY(-0.25em) scale(0.84);}}
.lyric-line.next{
  color:var(--muted);opacity:0.4;
  font-size:clamp(0.85rem,4vw,1.3rem);
  transform:translateY(0.25em) scale(0.84);
  animation:line-next 0.35s ease;
}
@keyframes line-next{0%{opacity:0.2;transform:translateY(0.5em) scale(0.78);}100%{opacity:0.4;transform:translateY(0.25em) scale(0.84);}}

/* ── Char units ── */
.char-unit{
  display:inline-block;
  transition:color 0.06s,transform 0.12s,text-shadow 0.12s,opacity 0.12s;
  cursor:pointer;
  pointer-events:all;
  position:relative;
}
.char-unit:hover{
  transform:translateY(-6px) scale(1.25) rotate(-3deg);
  color:var(--accent);
  transition:transform 0.15s cubic-bezier(.22,1,.36,1),color 0.1s;
}
.char-unit.active{
  color:var(--char-active);
  transform:translateY(-5px) scale(1.15);
  animation:char-pop 0.2s cubic-bezier(.22,1,.36,1);
}
body.theme-sun  .char-unit.active{text-shadow:0 0 6px rgba(255,140,0,0.7),0 1px 10px rgba(255,160,0,0.4);}
body.theme-star .char-unit.active{text-shadow:0 0 8px var(--c3),0 0 16px var(--accent);}
@keyframes char-pop{0%{transform:translateY(0) scale(0.9);}50%{transform:translateY(-8px) scale(1.25);}100%{transform:translateY(-5px) scale(1.15);}}
body.theme-sun  .char-unit.passed{color:var(--char-passed);opacity:0.7;}
body.theme-star .char-unit.passed{color:var(--char-passed);opacity:0.65;}

/* ── Char click burst ── */
@keyframes char-burst{
  0%{transform:translateY(-5px) scale(1.15) rotate(0deg);color:var(--c3);}
  30%{transform:translateY(-18px) scale(1.5) rotate(5deg);}
  100%{transform:translateY(-5px) scale(1.15) rotate(0deg);}
}
.char-unit.burst{animation:char-burst 0.4s cubic-bezier(.22,1,.36,1);}

/* ── Beat indicator ── */
#beat-indicator{
  position:fixed;top:1rem;right:1rem;
  width:14px;height:14px;border-radius:50%;
  background:var(--c2);
  box-shadow:0 0 14px var(--c2),0 0 30px var(--accent);
  opacity:0;z-index:10;transition:opacity 0.05s;
}
#beat-indicator.on{opacity:1}

/* ── Chord badge ── */
#chord-badge{
  position:fixed;bottom:5.5rem;left:50%;transform:translateX(-50%);
  font-size:0.72rem;letter-spacing:0.2em;
  color:var(--c1);opacity:0;
  transition:opacity 0.25s,transform 0.25s;
  z-index:10;
  padding:0.2rem 0.8rem;
  border-radius:20px;
  border:1px solid var(--ctrl-border);
  background:var(--ctrl-bg);
  backdrop-filter:blur(8px);
  white-space:nowrap;
  transform:translateX(-50%) scale(0.9);
}
#chord-badge.visible{opacity:1;transform:translateX(-50%) scale(1);}

/* ── Phrase progress micro-bar ── */
#phrase-bar-wrap{
  position:fixed;
  left:50%;transform:translateX(-50%);
  bottom:4.8rem;
  width:min(300px,60vw);
  height:2px;
  background:var(--ctrl-border);
  border-radius:2px;
  z-index:10;
  opacity:0;
  transition:opacity 0.3s;
}
#phrase-bar-wrap.visible{opacity:0.7;}
#phrase-bar-inner{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--c1),var(--c3));width:0%;transition:width 0.1s linear;}

/* ── Karaoke wash: handled per char-unit, no background-clip blur ── */

/* ══════════════════════════════════════
   THEME TOGGLE PILL
══════════════════════════════════════ */
#theme-toggle{
  position:relative;display:flex;align-items:center;
  background:var(--ctrl-bg);
  border:1.5px solid var(--c1);
  border-radius:30px;padding:3px;
  cursor:pointer;z-index:25;
  transition:border-color 0.5s,background 0.5s,box-shadow 0.3s;
  min-width:110px;min-height:40px;flex-shrink:0;
  user-select:none;
  box-shadow:0 2px 12px var(--shadow-col);
}
#theme-toggle:hover{box-shadow:0 4px 20px var(--shadow-col),0 0 0 2px var(--c1);}
#theme-toggle .t-opt{
  flex:1;text-align:center;font-family:inherit;
  font-size:0.6rem;letter-spacing:0.07em;
  padding:0.28rem 0.4rem;border-radius:26px;
  color:var(--muted);
  transition:color 0.3s,background 0.3s,box-shadow 0.3s;
  white-space:nowrap;line-height:1.3;
}
#theme-toggle .t-opt.active{
  color:var(--text-inv);background:var(--c1);
  box-shadow:0 0 14px var(--c1);font-weight:700;
}

/* ── Controls ── */
#controls{
  position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:0.5rem;
  z-index:20;width:calc(100% - 2rem);max-width:440px;
  background:var(--ctrl-bg);border:1px solid var(--ctrl-border);
  padding:0.65rem 0.9rem;border-radius:20px;
  backdrop-filter:blur(16px);
  transition:background 0.5s,border-color 0.5s;
  box-shadow:0 4px 30px var(--shadow-col);
}
#row-top{display:flex;gap:0.5rem;width:100%;align-items:center;}
#btn-row{display:flex;gap:0.5rem;justify-content:center;width:100%;}
.btn{
  background:transparent;
  border:1.5px solid var(--c1);
  color:var(--c1);
  font-family:inherit;font-size:0.68rem;letter-spacing:0.12em;
  padding:0.45rem 0.9rem;cursor:pointer;border-radius:16px;
  transition:background 0.2s,color 0.2s,box-shadow 0.2s,border-color 0.5s,transform 0.1s;
  flex:1;min-height:40px;
}
.btn:hover,.btn:focus{
  background:var(--c1);color:var(--text-inv);
  box-shadow:0 0 18px var(--c1);outline:none;
  transform:translateY(-1px);
}
.btn:active{background:var(--c1);color:var(--text-inv);transform:scale(0.95);}
#song-select{
  width:50%;
  background:var(--select-bg);border:1px solid var(--ctrl-border);
  color:var(--text);font-family:inherit;padding:0.45rem 0.7rem;
  border-radius:16px;cursor:pointer;flex:1;min-height:40px;font-size:16px;
  transition:background 0.5s,border-color 0.5s;
}

/* ── Progress bar ── */
#progress-bar{
  position:fixed;bottom:0;left:0;height:3px;
  background:linear-gradient(90deg,var(--accent),var(--c1),var(--c3));
  width:0%;z-index:30;transition:width 0.25s linear;
  box-shadow:0 0 8px var(--c2);
}

/* ── Info banner ── */
#info-banner{
  position:fixed;top:0.8rem;left:50%;transform:translateX(-50%);
  text-align:center;z-index:10;
  background:var(--banner-bg);border:1px solid var(--banner-border);
  padding:0.3rem 1rem;border-radius:16px;backdrop-filter:blur(12px);
  max-width:calc(100% - 4rem);
  transition:background 0.5s,border-color 0.5s;
  box-shadow:0 2px 16px var(--shadow-col);
}
#info-banner .label-top{font-size:0.55rem;letter-spacing:0.24em;color:var(--c1);text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color 0.5s;}
#info-banner .song-name{font-size:0.85rem;color:var(--text);letter-spacing:0.08em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60vw;}

/* ── Interactive hover panel ── */
#hover-panel{
  position:fixed;right:1rem;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:0.5rem;
  z-index:15;opacity:0.5;
  transition:opacity 0.3s;
}
#hover-panel:hover{opacity:1;}
.side-btn{
  width:38px;height:38px;border-radius:50%;
  background:var(--ctrl-bg);border:1px solid var(--ctrl-border);
  color:var(--c1);font-size:0.75rem;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;backdrop-filter:blur(8px);
  transition:background 0.2s,box-shadow 0.2s,transform 0.15s;
  box-shadow:0 2px 10px var(--shadow-col);
}
.side-btn:hover{background:var(--c1);color:var(--text-inv);transform:scale(1.1);box-shadow:0 0 16px var(--c1);}
.side-btn.active{background:var(--c1);color:var(--text-inv);}

/* ── Floating FA icon particles ── */
.float-icon{
  position:fixed;pointer-events:none;z-index:50;
  width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;
  font-size:0.95rem;
  color:var(--c1);
  animation:float-up 1.3s cubic-bezier(.22,1,.36,1) forwards;
  filter:drop-shadow(0 0 6px var(--accent));
}
@keyframes float-up{
  0%  {opacity:1;transform:translateY(0) scale(1) rotate(0deg);}
  40% {opacity:1;transform:translateY(-40px) scale(1.3) rotate(12deg);}
  80% {opacity:0.5;}
  100%{opacity:0;transform:translateY(-90px) scale(0.5) rotate(30deg);}
}

/* ── Color palette picker ── */
#palette-picker{
  position:fixed;left:1rem;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:0.4rem;
  z-index:15;opacity:0.5;
  transition:opacity 0.3s;
}
#palette-picker:hover{opacity:1;}
.pal-dot{
  width:22px;height:22px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;
  transition:transform 0.2s,border-color 0.2s,box-shadow 0.2s;
  box-shadow:0 1px 6px rgba(0,0,0,0.2);
}
.pal-dot:hover{transform:scale(1.3);}
.pal-dot.active{border-color:var(--text);box-shadow:0 0 10px var(--c1);}

/* ── Loading ── */
#loading{
  position:fixed;inset:0;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1rem;background:var(--bg);transition:opacity 0.6s;
}
#loading.hidden{opacity:0;pointer-events:none}
.loader-ring{
  width:50px;height:50px;
  border:2.5px solid var(--surface);
  border-top-color:var(--c2);border-right-color:var(--accent);
  border-radius:50%;animation:spin 0.75s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-size:0.72rem;color:var(--muted);letter-spacing:0.2em}

/* ── Ripple ── */
.ripple{
  position:fixed;border-radius:50%;
  border:1.5px solid var(--c1);
  pointer-events:none;z-index:5;
  animation:ripple-out 0.9s ease forwards;
}
@keyframes ripple-out{
  from{width:6px;height:6px;opacity:0.7;transform:translate(-50%,-50%) scale(1)}
  to{width:180px;height:180px;opacity:0;transform:translate(-50%,-50%) scale(1)}
}

/* ── Click splash ── */
.click-splash{
  position:fixed;pointer-events:none;z-index:6;
  border-radius:50%;
  animation:splash-out 0.5s ease forwards;
  background:radial-gradient(circle, var(--c2) 0%, var(--accent) 40%, transparent 70%);
}
@keyframes splash-out{
  from{width:8px;height:8px;opacity:0.9;transform:translate(-50%,-50%) scale(0);}
  to{width:100px;height:100px;opacity:0;transform:translate(-50%,-50%) scale(1);}
}

/* ── Colorscheme palette per st ── */
body.theme-sun.st-0{--c1:#e8a000;--c2:#f5c800;--c3:#ff9500;--accent:#ff6d00;--char-active:#ff6d00;--char-passed:#c98a20;}
body.theme-sun.st-1{--c1:#d4880a;--c2:#f0a830;--c3:#ffe0a0;--accent:#b85c00;--char-active:#b85c00;--char-passed:#c98a20;}
body.theme-sun.st-2{--c1:#e06000;--c2:#ff8c30;--c3:#ffc080;--accent:#c04000;--char-active:#c04000;--char-passed:#d07030;}
body.theme-sun.st-3{--c1:#c07a00;--c2:#e0a020;--c3:#f0c060;--accent:#9a5500;--char-active:#9a5500;--char-passed:#b07020;}
body.theme-sun.st-4{--c1:#e0b800;--c2:#f5d800;--c3:#fff080;--accent:#d08000;--char-active:#d08000;--char-passed:#b89040;}
body.theme-sun.st-5{--c1:#c85000;--c2:#e87020;--c3:#ffa060;--accent:#a03000;--char-active:#a03000;--char-passed:#c06020;}
body.theme-star.st-0{--c1:#39c5bb;--c2:#0ff0e4;--c3:#00fff7;--accent:#00e5ff;--char-active:#00fff7;--char-passed:#5ee7df;}
body.theme-star.st-1{--c1:#7c5cbf;--c2:#b08fff;--c3:#d4b4ff;--accent:#a855f7;--char-active:#d4b4ff;--char-passed:#9070d0;}
body.theme-star.st-2{--c1:#e85d8a;--c2:#ff8cb0;--c3:#ffc2d8;--accent:#f43f8e;--char-active:#ffc2d8;--char-passed:#d06090;}
body.theme-star.st-3{--c1:#f0a500;--c2:#ffc84a;--c3:#ffe399;--accent:#f59e0b;--char-active:#ffe399;--char-passed:#d09030;}
body.theme-star.st-4{--c1:#3da8e0;--c2:#7ecfff;--c3:#b5e8ff;--accent:#0ea5e9;--char-active:#b5e8ff;--char-passed:#5090c0;}
body.theme-star.st-5{--c1:#e05050;--c2:#ff8080;--c3:#ffb8b8;--accent:#ef4444;--char-active:#ffb8b8;--char-passed:#c06060;}

#theme-toggle .t-opt i{font-size:0.75rem;pointer-events:none;}
.btn i{font-size:0.8rem;}

/* ════ TABLET ≥ 600px ════ */
@media(min-width:600px){
  #eq-wrap{height:52px;gap:3px} .eq-bar{width:4px}
  #lyric-wrap{padding:5.5rem 2.5rem 7.5rem;gap:1.1rem;}
  .lyric-line{font-size:clamp(1.8rem,4.5vw,3rem);letter-spacing:0.12em;}
  .lyric-line.prev,.lyric-line.next{font-size:clamp(1rem,2.5vw,1.7rem);}
  #beat-indicator{top:1.5rem;right:1.8rem;}
  #chord-badge{bottom:5.8rem;font-size:0.78rem;}

/* ════ SUNFLOWER PETALS CANVAS ════ */
(function(){
  const canvas=document.getElementById('petals-canvas');
  const ctx=canvas.getContext('2d');
  let W,H,petals=[];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  function drawPetal(x,y,sz,ang,col,a){
    ctx.save();ctx.globalAlpha=a;ctx.translate(x,y);ctx.rotate(ang);
    ctx.beginPath();ctx.ellipse(0,-sz*0.5,sz*0.22,sz*0.5,0,0,Math.PI*2);
    ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=4;ctx.fill();ctx.restore();
  }
  function drawSunflower(x,y,r,ang,a){
    ctx.save();ctx.globalAlpha=a;ctx.translate(x,y);ctx.rotate(ang);
    const pc=['#f5c800','#ff9500','#ffdf00','#ff6f00'];
    for(let i=0;i<12;i++){
      ctx.save();ctx.rotate((i/12)*Math.PI*2);
      ctx.beginPath();ctx.ellipse(0,-(r*0.85),r*0.22,r*0.52,0,0,Math.PI*2);
      ctx.fillStyle=pc[i%4];ctx.fill();ctx.restore();
    }
    ctx.beginPath();ctx.arc(0,0,r*0.35,0,Math.PI*2);ctx.fillStyle='#3e2000';ctx.fill();
    ctx.beginPath();ctx.arc(0,0,r*0.20,0,Math.PI*2);ctx.fillStyle='#5c3000';ctx.fill();
    ctx.restore();
  }
  function mk(){
    const sf=Math.random()<0.15;
    return{x:Math.random()*W,y:Math.random()*-200,sz:sf?(14+Math.random()*18):(8+Math.random()*14),
      vx:(Math.random()-0.5)*0.6,vy:0.5+Math.random()*0.9,
      ang:Math.random()*Math.PI*2,va:(Math.random()-0.5)*0.025,
      alpha:0.4+Math.random()*0.45,
      col:['#f5c800','#ff9500','#ffdf00','#ff6f00','#ffe082'][Math.floor(Math.random()*5)],
      sf,sw:Math.random()*0.4,so:Math.random()*Math.PI*2,t:0};
  }
  function init(){resize();petals=Array.from({length:42},mk);}
  function draw(){
    ctx.clearRect(0,0,W,H);
    petals.forEach((p,i)=>{
      p.t+=0.02;p.x+=p.vx+Math.sin(p.t+p.so)*p.sw;p.y+=p.vy;p.ang+=p.va;
      if(p.sf)drawSunflower(p.x,p.y,p.sz,p.ang,p.alpha);
      else drawPetal(p.x,p.y,p.sz,p.ang,p.col,p.alpha);
      if(p.y>H+40)petals[i]=mk();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);
  init();draw();
})();

/* ════ STARFIELD CANVAS ════ */
(function(){
  const canvas=document.getElementById('star-canvas');
  const ctx=canvas.getContext('2d');
  let W,H,stars=[];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  function mk(){return{x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.4+0.2,vx:(Math.random()-0.5)*0.07,vy:(Math.random()-0.5)*0.07,a:Math.random()*0.7+0.2,tw:Math.random()*0.02};}
  function init(){resize();stars=Array.from({length:250},mk);}
  function draw(){
    ctx.clearRect(0,0,W,H);
    for(const s of stars){
      s.x+=s.vx;s.y+=s.vy;s.a+=s.tw;
      if(s.a>0.9||s.a<0.1)s.tw*=-1;
      if(s.x<0)s.x=W;if(s.x>W)s.x=0;if(s.y<0)s.y=H;if(s.y>H)s.y=0;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(180,240,255,${s.a})`;ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);
  init();draw();
})();

/* ════ BINARY RAIN ════ */
(function(){
  const canvas=document.getElementById('bin-canvas');
  const ctx=canvas.getContext('2d');
  let W,H,cols,drops=[];
  const FS=13;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;cols=Math.floor(W/FS);drops=Array.from({length:cols},()=>Math.random()*H/FS|0);}
  function draw(){
    const isSun=document.body.classList.contains('theme-sun');
    ctx.fillStyle=isSun?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.04)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle=isSun?'#e8a00055':'#0ff0e455';
    ctx.font=FS+'px monospace';
    for(let i=0;i<drops.length;i++){
      ctx.globalAlpha=Math.random()*0.25+0.03;
      ctx.fillText(Math.random()>0.5?'1':'0',i*FS,drops[i]*FS);
      if(drops[i]*FS>H&&Math.random()>0.975)drops[i]=0;
      drops[i]++;
    }
    ctx.globalAlpha=1;
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);
  resize();draw();
})();

/* ════ RIPPLE ════ */

/* ════ FLOATING FA ICON PARTICLES ════ */
const FA_SUN  = [

/* ════ GLOBAL CLICK INTERACTION ════ */
document.addEventListener('click', (e)=>{

/* ════ SHAKE LYRICS ════ */
function shakeLyrics(){

const shakeStyle=document.createElement('style');
shakeStyle.textContent=`@keyframes shake-it{0%{transform:translateX(0)}15%{transform:translateX(-10px) rotate(-2deg)}30%{transform:translateX(10px) rotate(2deg)}45%{transform:translateX(-8px) rotate(-1deg)}60%{transform:translateX(8px) rotate(1deg)}75%{transform:translateX(-4px)}90%{transform:translateX(4px)}100%{transform:translateX(0)}}`;

/* ════ SIDE BUTTONS ════ */
let emojiMode = false;
document.getElementById('btn-emoji').addEventListener('click', ()=>{

/* ════ LYRIC HELPERS ════ */
function buildPhraseHtml(text){
  if(!text)return'';
  return[...text].map((ch,i)=>`<span class="char-unit" data-idx="${i}">${ch===' '?'&nbsp;':ch}</span>`).join('');
}
function buildCharMap(phrase){
  const ft=phrase.text||'',tm=new Array([...ft].length).fill(null);
  let cp=0,w=phrase.firstWord;
  while(w){
    const wc=[...(w.text||'')],fc=[...ft];
    let ws=-1;
    for(let i=cp;i<=fc.length-wc.length;i++){
      let ok=true;for(let k=0;k<wc.length;k++){if(fc[i+k]!==wc[k]){ok=false;break;}}
      if(ok){ws=i;break;}
    }
    if(ws>=0){
      cp=ws;let c=w.firstChar,co=0;
      while(c){
        const cl=[...(c.text||'')].length;
        for(let k=0;k<cl;k++){if(cp+co+k<tm.length)tm[cp+co+k]={startTime:c.startTime,endTime:c.endTime};}
        co+=cl;c=c.next;
      }
      cp+=wc.length;
    }
    w=w.next;
  }
  return tm;
}

let player=null,phrases=[],currentPhraseIdx=-1,charMaps=[];
let currentPhraseStart=0,currentPhraseEnd=0;

function attachCharListeners(){
  document.querySelectorAll('#lyric-current .char-unit').forEach(el=>{
    el.addEventListener('click', (e)=>{
      e.stopPropagation();
      el.classList.add('burst');
      setTimeout(()=>el.classList.remove('burst'),450);
      spawnIcons(e.clientX, e.clientY);
    });
    el.addEventListener('mouseenter', ()=>{
      if(shakeMode){el.style.transform='translateY(-8px) scale(1.3) rotate('+((Math.random()-0.5)*15)+'deg)';}
    });
    el.addEventListener('mouseleave', ()=>{
      if(shakeMode){el.style.transform='';}
    });
  });
}

function updatePhrase(idx){
  if(idx===currentPhraseIdx)return;
  currentPhraseIdx=idx;
  $prev.innerHTML   =phrases[idx-1]?.text?buildPhraseHtml(phrases[idx-1].text):'';
  $current.innerHTML=phrases[idx]?.text  ?buildPhraseHtml(phrases[idx].text)  :'';
  $next.innerHTML   =phrases[idx+1]?.text?buildPhraseHtml(phrases[idx+1].text):'';
  attachCharListeners();
  if(phrases[idx]){
    currentPhraseStart=phrases[idx].startTime;
    currentPhraseEnd=phrases[idx].endTime;
    $phraseWrap.classList.add('visible');
  }
  if(emojiMode) spawnIcons(window.innerWidth/2, window.innerHeight*0.4);
}

function highlightChars(pos, pi){
  const tm=charMaps[pi];if(!tm)return;
  let activeCount=0;
  const units=document.querySelectorAll('#lyric-current .char-unit');
  units.forEach((el,i)=>{
    const t=tm[i];
    if(!t){el.classList.remove('active','passed');return;}
    if(pos>=t.startTime&&pos<t.endTime){el.classList.add('active');el.classList.remove('passed');activeCount++;}
    else if(pos>=t.endTime){el.classList.remove('active');el.classList.add('passed');}
    else{el.classList.remove('active','passed');}
  });

  // phrase micro-bar
  if(currentPhraseEnd>currentPhraseStart){
    const pct=Math.min(100,Math.max(0,((pos-currentPhraseStart)/(currentPhraseEnd-currentPhraseStart))*100));
    $phraseBar.style.width=pct+'%';
  }
}

function clearHighlight(){
  document.querySelectorAll('#lyric-current .char-unit').forEach(el=>el.classList.remove('active','passed'));
  $phraseWrap.classList.remove('visible');
  $phraseBar.style.width='0%';
}

/* ════ PLAYER ════ */
function initPlayer(){
  const {Player}=TextAliveApp;
  player=new Player({
    app:{token:"E96Wa5egutbj0ueY"},
    mediaElement:document.createElement('audio'),
    mediaBannerPosition:'top left'
  });
  player.addListener({
    onAppReady(app){if(!app.managed)loadSong($songSel.value);$loading.classList.add('hidden');},
    onVideoReady(v){
      phrases=[];charMaps=[];
      let p=v.firstPhrase;while(p){phrases.push(p);charMaps.push(buildCharMap(p));p=p.next;}
      currentPhraseIdx=-1;
      $current.innerHTML='<i class="fa-solid fa-music"></i>';
      $prev.innerHTML='';$next.innerHTML='';
    },
    onTimerReady(){$songTitle.textContent=SONGS[$songSel.value]?.name||'—';},
    onTimeUpdate(pos){
      if(!player.video)return;
      const dur=player.video.duration;
      if(dur>0)$progress.style.width=((pos/dur)*100)+'%';
      let found=-1;
      for(let i=0;i<phrases.length;i++){if(pos>=phrases[i].startTime&&pos<phrases[i].endTime){found=i;break;}}
      if(found>=0){updatePhrase(found);highlightChars(pos,found);}
      else clearHighlight();
    },
    onBeat(){
      $beat.classList.add('on');
      spawnRipple();
      if(shakeMode) shakeLyrics();
      setTimeout(()=>$beat.classList.remove('on'),130);
    },
    onChord(chord){
      if(chord?.name){
        $chord.textContent=chord.name;
        $chord.classList.add('visible');
        clearTimeout($chord._t);
        $chord._t=setTimeout(()=>$chord.classList.remove('visible'),1300);
      }
    },
    onPlay(){animateEq()},
    onPause(){stopEq()},
    onStop(){
      stopEq();
      $progress.style.width='0%';
      $current.innerHTML='<i class="fa-solid fa-music"></i>';
      $prev.innerHTML='';$next.innerHTML='';
      clearHighlight();
    }
  });
}

function loadSong(key){
  const song=SONGS[key];if(!song||!player)return;
  applyTheme(currentTheme, song.st);
  $songTitle.textContent=song.name;
  $loading.classList.remove('hidden');
  player.createFromSongUrl(song.url,{video:song.video})
    .then(()=>$loading.classList.add('hidden'))
    .catch(err=>{console.error(err);$loading.classList.add('hidden');});
}

document.getElementById('btn-play') .addEventListener('click',()=>player?.requestPlay());
document.getElementById('btn-pause').addEventListener('click',()=>player?.requestPause());
document.getElementById('btn-stop') .addEventListener('click',()=>player?.requestStop());
$songSel.addEventListener('change',()=>{player?.requestStop();loadSong($songSel.value);});

/* ════ KEYBOARD SHORTCUTS ════ */
document.addEventListener('keydown',(e)=>{
  if(e.target.tagName==='SELECT')return;
  if(e.code==='Space'){e.preventDefault();player?.requestPlay();}
  if(e.code==='KeyP'){player?.requestPause();}
  if(e.code==='KeyS'){player?.requestStop();}
  if(e.code==='KeyT'){$toggle.click();}
  if(e.code==='KeyE'){document.getElementById('btn-emoji').click();}
  if(e.code==='KeyW'){document.getElementById('btn-shake').click();}
  if(e.code==='Digit1'||e.code==='Digit2'||e.code==='Digit3'||
     e.code==='Digit4'||e.code==='Digit5'||e.code==='Digit6'){
    const n=parseInt(e.key)-1;applyTheme(currentTheme,n);
  }
});

/* ════ TOUCH SWIPE TO CHANGE THEME ════ */
let touchStartX=0;
document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  if(Math.abs(dx)>80){
    applyTheme(currentTheme==='sun'?'star':'sun', currentSt);
  }
},{passive:true});

/* ════ INIT ════ */
buildPalette();
initPlayer();
</script>
</body>
</html>
