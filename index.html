<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Magical Mirai 2026 · Lyric App · Rico Eriansyah</title>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<script src="https://unpkg.com/textalive-app-api/dist/index.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Kurenaido&family=Noto+Serif+JP:wght@300;400;700&display=swap');

/* ════════════════════════════════════════
   THEME VARIABLES
════════════════════════════════════════ */
body.theme-sun {
  --bg:#ffffff; --surface:#f5f0e8;
  --c1:#e8a000; --c2:#f5c800; --c3:#ff9500; --accent:#ff6d00;
  --text:#1a0e00; --text-lyric:#1a0e00; --text-inv:#ffffff; --muted:#b89060;
  --ctrl-bg:rgba(255,255,255,0.9); --ctrl-border:rgba(232,160,0,0.35);
  --select-bg:rgba(245,240,232,0.97); --banner-bg:rgba(255,255,255,0.9);
  --banner-border:rgba(232,160,0,0.3); --shadow-col:rgba(232,160,0,0.18);
  --char-active:#ff6d00; --char-passed:#c98a20; --char-default:#1a0e00;
  --pulse-col:rgba(255,180,0,0.08);
  --miku-opacity:0.18;
  --miku-blend:normal;
  --particle-col1:rgba(255,200,0,0.7);
  --particle-col2:rgba(255,140,0,0.6);
  --particle-col3:rgba(255,230,100,0.5);
}
body.theme-star {
  --bg:#000000; --surface:#080812;
  --c1:#39c5bb; --c2:#0ff0e4; --c3:#00fff7; --accent:#00e5ff;
  --text:#e8e0ff; --text-lyric:#e8e0ff; --text-inv:#000000; --muted:#3a4a5a;
  --ctrl-bg:rgba(0,0,0,0.88); --ctrl-border:rgba(57,197,187,0.25);
  --select-bg:rgba(8,8,18,0.95); --banner-bg:rgba(0,0,0,0.8);
  --banner-border:rgba(57,197,187,0.2); --shadow-col:rgba(57,197,187,0.15);
  --char-active:#00fff7; --char-passed:#5ee7df; --char-default:#e8e0ff;
  --pulse-col:rgba(57,197,187,0.07);
  --miku-opacity:0.22;
  --miku-blend:screen;
  --particle-col1:rgba(57,197,187,0.7);
  --particle-col2:rgba(0,255,247,0.5);
  --particle-col3:rgba(170,240,255,0.4);
}

/* per-song overrides */
body.theme-sun.st-0{--c1:#e8a000;--c2:#f5c800;--c3:#ff9500;--accent:#ff6d00;--char-active:#ff6d00;--char-passed:#c98a20}
body.theme-sun.st-1{--c1:#d4880a;--c2:#f0a830;--c3:#ffe0a0;--accent:#b85c00;--char-active:#b85c00;--char-passed:#c98a20}
body.theme-sun.st-2{--c1:#e06000;--c2:#ff8c30;--c3:#ffc080;--accent:#c04000;--char-active:#c04000;--char-passed:#d07030}
body.theme-sun.st-3{--c1:#c07a00;--c2:#e0a020;--c3:#f0c060;--accent:#9a5500;--char-active:#9a5500;--char-passed:#b07020}
body.theme-sun.st-4{--c1:#e0b800;--c2:#f5d800;--c3:#fff080;--accent:#d08000;--char-active:#d08000;--char-passed:#b89040}
body.theme-sun.st-5{--c1:#c85000;--c2:#e87020;--c3:#ffa060;--accent:#a03000;--char-active:#a03000;--char-passed:#c06020}
body.theme-star.st-0{--c1:#39c5bb;--c2:#0ff0e4;--c3:#00fff7;--accent:#00e5ff;--char-active:#00fff7;--char-passed:#5ee7df}
body.theme-star.st-1{--c1:#7c5cbf;--c2:#b08fff;--c3:#d4b4ff;--accent:#a855f7;--char-active:#d4b4ff;--char-passed:#9070d0}
body.theme-star.st-2{--c1:#e85d8a;--c2:#ff8cb0;--c3:#ffc2d8;--accent:#f43f8e;--char-active:#ffc2d8;--char-passed:#d06090}
body.theme-star.st-3{--c1:#f0a500;--c2:#ffc84a;--c3:#ffe399;--accent:#f59e0b;--char-active:#ffe399;--char-passed:#d09030}
body.theme-star.st-4{--c1:#3da8e0;--c2:#7ecfff;--c3:#b5e8ff;--accent:#0ea5e9;--char-active:#b5e8ff;--char-passed:#5090c0}
body.theme-star.st-5{--c1:#e05050;--c2:#ff8080;--c3:#ffb8b8;--accent:#ef4444;--char-active:#ffb8b8;--char-passed:#c06060}

/* ── Reset & base ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-text-size-adjust:100%}
body{
  font-family:'Zen Kurenaido','Noto Serif JP',serif;
  background:var(--bg);color:var(--text);
  width:100%;height:100%;min-height:100dvh;
  overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;
  transition:background .7s,color .5s;
  cursor:default;
}
@media(hover:hover){body{cursor:none}}

/* ── Custom cursor ── */
#cursor,#cursor-dot{display:none}
@media(hover:hover){
  #cursor{display:block;position:fixed;pointer-events:none;z-index:9999;width:18px;height:18px;border:2px solid var(--c1);border-radius:50%;transform:translate(-50%,-50%);transition:border-color .3s,width .15s,height .15s;mix-blend-mode:difference}
  #cursor.clicking{width:10px;height:10px}
  #cursor-dot{display:block;position:fixed;pointer-events:none;z-index:9999;width:4px;height:4px;background:var(--c1);border-radius:50%;transform:translate(-50%,-50%);transition:background .3s}
  body{cursor:none}
}

.trail-icon{position:fixed;pointer-events:none;z-index:9990;font-size:.6rem;color:var(--c1);opacity:0;transform:translate(-50%,-50%);animation:trail-fade .7s ease forwards;filter:drop-shadow(0 0 3px var(--accent))}
@keyframes trail-fade{0%{opacity:.8;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-120%) scale(.3)}}

/* ════ BACKGROUND ════ */
#bg-layer{position:fixed;inset:0;z-index:0;pointer-events:none;transition:opacity .8s}
body.theme-sun  #bg-layer{background:radial-gradient(ellipse 70% 55% at 50% -5%,rgba(255,200,50,.15) 0%,rgba(255,140,0,.06) 40%,transparent 70%),radial-gradient(ellipse 100% 40% at 50% 110%,rgba(255,160,0,.05) 0%,transparent 60%)}
body.theme-star #bg-layer{background:radial-gradient(ellipse 60% 50% at 50% -5%,rgba(30,80,120,.35) 0%,rgba(10,20,60,.2) 50%,transparent 75%),radial-gradient(ellipse 80% 30% at 80% 80%,rgba(57,197,187,.08) 0%,transparent 60%)}

#beat-pulse{position:fixed;inset:0;z-index:2;pointer-events:none;background:var(--pulse-col);opacity:0;transition:opacity .05s}
#beat-pulse.on{opacity:1}

/* ── Sun orb ── */
#sun-orb,#sun-rays{position:fixed;top:-90px;left:50%;transform:translateX(-50%);width:min(240px,80vw);height:min(240px,80vw);pointer-events:none;z-index:1;transition:opacity .8s}
#sun-orb{border-radius:50%;background:radial-gradient(circle,#fff7cc 0%,#ffe033 35%,#ff9500 65%,transparent 100%);box-shadow:0 0 80px 30px rgba(255,180,0,.3),0 0 160px 60px rgba(255,140,0,.12);animation:sun-breathe 4s ease-in-out infinite}
@keyframes sun-breathe{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.06)}}
#sun-rays{animation:rays-spin 20s linear infinite}
#sun-rays::before{content:'';position:absolute;top:50%;left:50%;width:700px;height:700px;transform:translate(-50%,-50%);background:repeating-conic-gradient(from 0deg,rgba(245,200,0,.04) 0deg 12deg,transparent 12deg 24deg);border-radius:50%}
@keyframes rays-spin{to{transform:translateX(-50%) rotate(360deg)}}
body.theme-star #sun-orb,body.theme-star #sun-rays{opacity:0}
body.theme-sun  #sun-orb,body.theme-sun  #sun-rays{opacity:1}

/* ── Canvases ── */
#petals-canvas,#star-canvas,#bin-canvas{position:fixed;inset:0;z-index:1;pointer-events:none;transition:opacity .7s}
body.theme-sun  #petals-canvas{opacity:.6} body.theme-sun  #star-canvas{opacity:0}  body.theme-sun  #bin-canvas{opacity:.03}
body.theme-star #petals-canvas{opacity:0}  body.theme-star #star-canvas{opacity:1}  body.theme-star #bin-canvas{opacity:.07}

/* ════════════════════════════════════════
   MIKU CHARACTER — THEME-AWARE
════════════════════════════════════════ */
#miku-wrap{
  position:fixed;
  bottom:0;
  /* right side, above controls */
  right:clamp(-2rem, -2vw, 0px);
  z-index:2;
  pointer-events:none;
  display:flex;align-items:flex-end;
  /* height: up to 75% of viewport, won't cover lyrics */
  height:min(75dvh, 520px);
  width:auto;
  transition:opacity .8s cubic-bezier(.22,1,.36,1), transform 1s cubic-bezier(.22,1,.36,1), filter .8s;
  /* offset right on small screens so it doesn't obscure center */
  transform:translateX(8%);
}

/* Sun theme: hero_img.webp — push slightly right */
body.theme-sun  #miku-wrap{
  filter:drop-shadow(0 0 18px rgba(255,200,0,.25)) drop-shadow(0 0 40px rgba(255,140,0,.12));
  opacity:.88;
}
/* Star theme: img_illust_mikunt.png */
body.theme-star #miku-wrap{
  filter:drop-shadow(0 0 20px rgba(57,197,187,.35)) drop-shadow(0 0 50px rgba(0,229,255,.18));
  opacity:.82;
}

#miku-img{
  height:100%;
  width:auto;
  object-fit:contain;
  object-position:bottom center;
  display:block;
  transition:opacity .7s, transform .7s;
}

/* entrance animation */
@keyframes miku-enter{
  from{opacity:0;transform:translateY(30px) scale(.95)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
#miku-img{animation:miku-enter 1.2s cubic-bezier(.22,1,.36,1) both}

/* breathing idle */
@keyframes miku-breathe{
  0%,100%{transform:translateY(0) scale(1)}
  50%{transform:translateY(-6px) scale(1.008)}
}
#miku-img{animation:miku-enter 1.2s cubic-bezier(.22,1,.36,1) both, miku-breathe 5s ease-in-out 1.2s infinite}

/* beat pulse: triggered by JS class */
#miku-img.on-beat{
  animation:miku-enter 1.2s cubic-bezier(.22,1,.36,1) both,
            miku-breathe 5s ease-in-out 1.2s infinite,
            miku-beat .18s ease;
}
@keyframes miku-beat{
  0%{transform:scale(1)}
  40%{transform:scale(1.025) translateY(-4px)}
  100%{transform:scale(1)}
}

/* hide on very small narrow screens in landscape to avoid covering lyrics */
@media(max-width:380px) and (max-height:480px){#miku-wrap{display:none}}

/* Responsive sizing */
@media(min-width:600px){
  #miku-wrap{height:min(78dvh,580px);right:clamp(-1rem,0vw,0px);transform:translateX(4%)}
}
@media(min-width:1024px){
  #miku-wrap{height:min(82dvh,680px);right:0;transform:translateX(0)}
}

/* ════ MIKU PARTICLES CANVAS ════ */
#miku-particles{
  position:fixed;
  bottom:0;right:0;
  width:min(55vw, 420px);
  height:min(85dvh, 600px);
  pointer-events:none;
  z-index:3;
  transition:opacity .7s;
}
body.theme-sun  #miku-particles{opacity:.75}
body.theme-star #miku-particles{opacity:.85}

/* ── EQ bars ── */
#eq-wrap{position:fixed;bottom:0;left:0;right:0;height:clamp(32px,5vw,52px);display:flex;align-items:flex-end;justify-content:center;gap:2px;z-index:2;pointer-events:none}
.eq-bar{width:clamp(2px,.6vw,4px);border-radius:2px 2px 0 0;background:linear-gradient(to top,var(--accent),var(--c2));height:3px;transition:height .09s}
body.theme-sun  .eq-bar{opacity:.3}
body.theme-star .eq-bar{opacity:.5}

/* ════ STAGE & LYRIC WRAP ════ */
#stage{position:relative;z-index:3;width:100vw;height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center}

#lyric-wrap{
  position:absolute;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;
  gap:clamp(.5rem,2vw,.9rem);
  padding:
    calc(env(safe-area-inset-top,0px) + 4.5rem)
    clamp(.75rem,4vw,2.5rem)
    calc(env(safe-area-inset-bottom,0px) + 8rem)
    clamp(.75rem,4vw,2.5rem);
  transition:transform .4s cubic-bezier(.22,1,.36,1);
  /* nudge lyrics left so they share space with Miku on wide screens */
}
@media(min-width:700px){
  #lyric-wrap{padding-right:clamp(35%,40vw,48%)}
}

/* ── Lyric lines ── */
.lyric-line{font-size:clamp(1.4rem,6.5vw,2.4rem);font-weight:700;letter-spacing:.08em;text-align:center;width:100%;transition:opacity .4s,transform .4s,font-size .5s;line-height:1.5;word-break:break-word;overflow-wrap:break-word;hyphens:auto;color:var(--text-lyric)}
.lyric-line.current{animation:line-in .45s cubic-bezier(.22,1,.36,1)}
body.chorus-mode .lyric-line.current{font-size:clamp(1.75rem,8vw,3.2rem)}
@keyframes line-in{0%{opacity:0;transform:translateY(18px) scale(.91)}60%{opacity:1;transform:translateY(-4px) scale(1.03)}100%{opacity:1;transform:translateY(0) scale(1)}}
.lyric-line.prev{color:var(--muted);opacity:.38;font-size:clamp(.8rem,3.5vw,1.3rem);transform:translateY(-.25em) scale(.84);animation:line-prev .35s ease}
@keyframes line-prev{0%{opacity:.8;transform:translateY(0) scale(1)}100%{opacity:.38;transform:translateY(-.25em) scale(.84)}}
.lyric-line.next{color:var(--muted);opacity:.38;font-size:clamp(.8rem,3.5vw,1.3rem);transform:translateY(.25em) scale(.84);animation:line-next .35s ease}
@keyframes line-next{0%{opacity:.15;transform:translateY(.5em) scale(.78)}100%{opacity:.38;transform:translateY(.25em) scale(.84)}}

/* ── Char units ── */
.char-unit{display:inline-block;color:var(--char-default);transition:color .06s,transform .12s,opacity .12s;position:relative;will-change:transform}
@media(hover:hover){
  .char-unit{cursor:none;pointer-events:all}
  .char-unit:hover{color:var(--accent);transform:translateY(-8px) scale(1.28) rotate(-4deg);transition:transform .18s cubic-bezier(.22,1,.36,1),color .1s;z-index:2}
}
@media(hover:none){.char-unit{pointer-events:all;touch-action:manipulation}}
.char-unit.active{color:var(--char-active);transform:translateY(-5px) scale(1.15);animation:char-pop .22s cubic-bezier(.22,1,.36,1)}
body.theme-sun  .char-unit.active{text-shadow:0 0 6px rgba(255,140,0,.55),0 1px 8px rgba(255,160,0,.3)}
body.theme-star .char-unit.active{text-shadow:0 0 7px var(--c3),0 0 14px var(--accent)}
@keyframes char-pop{0%{transform:translateY(0) scale(.88)}50%{transform:translateY(-9px) scale(1.28)}100%{transform:translateY(-5px) scale(1.15)}}
body.theme-sun  .char-unit.passed{color:var(--char-passed);opacity:.68}
body.theme-star .char-unit.passed{color:var(--char-passed);opacity:.62}
.char-unit.word-glow{animation:word-glow-anim .7s ease}
@keyframes word-glow-anim{0%{color:var(--char-active);transform:translateY(-6px) scale(1.2)}50%{color:var(--c2);transform:translateY(-10px) scale(1.32)}100%{color:var(--char-active)}}
@keyframes char-burst{0%{transform:translateY(-5px) scale(1.15) rotate(0deg)}30%{transform:translateY(-20px) scale(1.55) rotate(6deg)}100%{transform:translateY(-5px) scale(1.15) rotate(0deg)}}
.char-unit.burst{animation:char-burst .45s cubic-bezier(.22,1,.36,1)}

/* ── Floating icons ── */
.float-icon{position:fixed;pointer-events:none;z-index:9980;display:flex;align-items:center;justify-content:center;animation:float-up 1.3s cubic-bezier(.22,1,.36,1) forwards}
@keyframes float-up{0%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0deg)}40%{opacity:1;transform:translate(-50%,-120%) scale(1.35) rotate(14deg)}80%{opacity:.4}100%{opacity:0;transform:translate(-50%,-200%) scale(.4) rotate(35deg)}}

/* ── Burst ring ── */
.burst-ring{position:fixed;pointer-events:none;z-index:4;border-radius:50%;border:2px solid var(--c1);width:20px;height:20px;left:50%;top:50%;animation:ring-out .7s ease forwards}
@keyframes ring-out{from{opacity:.7;transform:translate(-50%,-50%) scale(.5)}to{opacity:0;transform:translate(-50%,-50%) scale(4)}}

/* ── Beat indicator ── */
#beat-indicator{position:fixed;margin-top:calc(env(safe-area-inset-top,0px) + .7rem);right:clamp(.75rem,3vw,1.5rem);width:12px;height:12px;border-radius:50%;background:var(--c2);box-shadow:0 0 14px var(--c2),0 0 30px var(--accent);opacity:0;z-index:10;transition:opacity .05s}
#beat-indicator.on{opacity:1}

/* ── Chord badge ── */
#chord-badge{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 6rem);left:50%;font-size:.7rem;letter-spacing:.18em;color:var(--c1);opacity:0;transition:opacity .25s,transform .25s;z-index:10;padding:.2rem .8rem;border-radius:20px;border:1px solid var(--ctrl-border);background:var(--ctrl-bg);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);white-space:nowrap;transform:translateX(-50%) scale(.9)}
#chord-badge.visible{opacity:1;transform:translateX(-50%) scale(1)}

/* ── Phrase micro-bar ── */
#phrase-bar-wrap{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom,0px) + 5.2rem);width:min(280px,55vw);height:2px;background:var(--ctrl-border);border-radius:2px;z-index:10;opacity:0;transition:opacity .3s}
#phrase-bar-wrap.visible{opacity:.65}
#phrase-bar-inner{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--c1),var(--c3));width:0%;transition:width .1s linear}

/* ════ THEME TOGGLE ════ */
#theme-toggle{position:relative;display:flex;align-items:center;background:var(--ctrl-bg);border:1.5px solid var(--c1);border-radius:30px;padding:3px;cursor:pointer;z-index:25;transition:border-color .5s,background .5s,box-shadow .3s;min-width:100px;height:38px;flex-shrink:0;user-select:none;box-shadow:0 2px 12px var(--shadow-col);touch-action:manipulation}
@media(hover:hover){#theme-toggle{cursor:none}}
#theme-toggle:hover{box-shadow:0 4px 20px var(--shadow-col),0 0 0 2px var(--c1)}
#theme-toggle .t-opt{flex:1;text-align:center;font-family:inherit;font-size:.58rem;letter-spacing:.06em;padding:.25rem .35rem;border-radius:26px;color:var(--muted);transition:color .3s,background .3s,box-shadow .3s;white-space:nowrap;line-height:1.3;pointer-events:none}
#theme-toggle .t-opt.active{color:var(--text-inv);background:var(--c1);box-shadow:0 0 14px var(--c1);font-weight:700}
#theme-toggle .t-opt i{font-size:.72rem}

/* ════ CONTROLS — MOBILE FIRST ════ */
#controls{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + .6rem);left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:.4rem;z-index:20;width:calc(100% - 1.2rem);max-width:480px;background:var(--ctrl-bg);border:1px solid var(--ctrl-border);padding:.55rem .7rem;border-radius:18px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);transition:background .5s,border-color .5s;box-shadow:0 4px 30px var(--shadow-col)}
#row-top{display:flex;gap:.45rem;width:100%;align-items:center}
#btn-row{display:flex;gap:.45rem;width:100%}
.btn{background:transparent;border:1.5px solid var(--c1);color:var(--c1);font-family:inherit;font-size:.65rem;letter-spacing:.1em;padding:.4rem .6rem;border-radius:14px;transition:background .2s,color .2s,box-shadow .2s,transform .1s;flex:1;min-height:40px;touch-action:manipulation;cursor:pointer}
@media(hover:hover){.btn{cursor:none}}
.btn:hover,.btn:focus{background:var(--c1);color:var(--text-inv);box-shadow:0 0 18px var(--c1);outline:none;transform:translateY(-1px)}
.btn:active{transform:scale(.94)}
.btn i{font-size:.78rem;pointer-events:none}
#song-select{flex:1;background:var(--select-bg);border:1px solid var(--ctrl-border);color:var(--text);font-family:inherit;padding:.4rem .6rem;border-radius:14px;min-height:40px;font-size:max(16px,.75rem);transition:background .5s,border-color .5s;cursor:pointer;appearance:auto;-webkit-appearance:auto}

@media(min-width:600px){
  #controls{flex-direction:row;flex-wrap:wrap;justify-content:center;width:auto;max-width:560px;padding:.6rem 1rem;border-radius:28px;bottom:calc(env(safe-area-inset-bottom,0px) + 1rem);gap:.55rem}
  #row-top,#btn-row{width:auto;flex:none}
  .btn{flex:none;font-size:.7rem;padding:.45rem 1rem;min-height:36px}
  #song-select{flex:none;width:auto;min-width:160px;max-width:200px;font-size:.7rem;min-height:36px}
  #theme-toggle{height:36px;min-width:110px}
}
@media(min-width:1024px){
  #controls{flex-direction:row;flex-wrap:nowrap;max-width:none;padding:.65rem 1.4rem;border-radius:40px;bottom:calc(env(safe-area-inset-bottom,0px) + 1.4rem);gap:.85rem}
  .btn{font-size:.72rem;padding:.48rem 1.1rem}
  #song-select{min-width:200px;max-width:240px;font-size:.72rem}
}

/* ════ PROGRESS BAR ════ */

/* ════ MIKU PARTICLES ════ */
(function(){
  const ctx=$mikuPc.getContext('2d');
  let W,H,particles=[];
  let isStar=false;

  function resize(){
    W=$mikuPc.width=$mikuPc.offsetWidth||window.innerWidth*.55;
    H=$mikuPc.height=$mikuPc.offsetHeight||window.innerHeight*.85;
  }

  function mkParticle(){
    const star=isStar;
    const size=star?(1.5+Math.random()*3):(2+Math.random()*5);
    return{
      // spawn along the character silhouette area (right side canvas)
      x:W*(0.15+Math.random()*0.75),
      y:H*(0.1+Math.random()*0.85),
      vx:(Math.random()-.5)*(star?.6:.4),
      vy:star?(-0.4-Math.random()*.8):(-0.5-Math.random()*1),
      life:0,
      maxLife:star?(120+Math.random()*160):(80+Math.random()*120),
      size,
      rot:Math.random()*Math.PI*2,
      rotSpeed:(Math.random()-.5)*.05,
      type:star?(Math.random()>.5?'star':'circle'):(Math.random()>.6?'flower':'circle'),
    };
  }

  function drawStar(ctx,x,y,r,pts=5){
    ctx.beginPath();
    for(let i=0;i<pts*2;i++){
      const a=i*Math.PI/pts - Math.PI/2;
      const ri=i%2===0?r:r*.45;
      i===0?ctx.moveTo(x+Math.cos(a)*ri,y+Math.sin(a)*ri):ctx.lineTo(x+Math.cos(a)*ri,y+Math.sin(a)*ri);
    }
    ctx.closePath();
  }

  function drawFlower(ctx,x,y,r){
    for(let i=0;i<5;i++){
      const a=(i/5)*Math.PI*2;
      ctx.beginPath();
      ctx.ellipse(x+Math.cos(a)*r*.55,y+Math.sin(a)*r*.55,r*.45,r*.22,(i/5)*Math.PI*2,0,Math.PI*2);
      ctx.fill();
    }
    ctx.beginPath();ctx.arc(x,y,r*.28,0,Math.PI*2);ctx.fill();
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    isStar=document.body.classList.contains('theme-star');

    // spawn rate
    if(Math.random()< (isStar?.18:.14)) particles.push(mkParticle());
    if(particles.length>90) particles.splice(0,particles.length-90);

    particles.forEach((p,i)=>{
      p.life++;p.x+=p.vx;p.y+=p.vy;p.rot+=p.rotSpeed;
      if(isStar) p.vx+=Math.sin(p.life*.04)*.012;
      const prog=p.life/p.maxLife;
      const alpha=prog<.2?(prog/.2):prog>.75?((1-prog)/.25):1;
      const sz=p.size*(prog<.15?prog/.15:1);

      ctx.save();
      ctx.globalAlpha=alpha*(.6+(Math.sin(p.life*.08)*.15));
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot);

      if(isStar){
        const g=ctx.createRadialGradient(0,0,0,0,0,sz*2);
        g.addColorStop(0,'rgba(0,255,247,0.9)');
        g.addColorStop(.5,'rgba(57,197,187,0.6)');
        g.addColorStop(1,'rgba(0,200,220,0)');
        ctx.fillStyle=g;
        if(p.type==='star'){drawStar(ctx,0,0,sz,5);ctx.fill();}
        else{ctx.beginPath();ctx.arc(0,0,sz*.7,0,Math.PI*2);ctx.fill();}
        // tiny glow halo
        ctx.globalAlpha*=.3;
        ctx.beginPath();ctx.arc(0,0,sz*2,0,Math.PI*2);
        ctx.fillStyle='rgba(0,255,247,0.15)';ctx.fill();
      } else {
        // sun theme: golden petals + circles
        if(p.type==='flower'){
          ctx.fillStyle=`hsl(${38+Math.random()*20},95%,${55+Math.random()*15}%)`;
          drawFlower(ctx,0,0,sz);
        } else {
          const g=ctx.createRadialGradient(0,0,0,0,0,sz*1.5);
          g.addColorStop(0,'rgba(255,230,50,0.95)');
          g.addColorStop(.6,'rgba(255,160,0,0.6)');
          g.addColorStop(1,'rgba(255,100,0,0)');
          ctx.fillStyle=g;
          ctx.beginPath();ctx.arc(0,0,sz,0,Math.PI*2);ctx.fill();
        }
      }
      ctx.restore();
      if(p.life>=p.maxLife) particles.splice(i,1);
    });
    requestAnimationFrame(draw);
  }

  const ro=new ResizeObserver(resize);
  ro.observe($mikuPc);
  resize();draw();
})();

(function(){

  function drawSunflower(x,y,r,ang,a){ctx.save();ctx.globalAlpha=a;ctx.translate(x,y);ctx.rotate(ang);const pc=['#f5c800','#ff9500','#ffdf00','#ff6f00'];for(let i=0;i<12;i++){ctx.save();ctx.rotate((i/12)*Math.PI*2);ctx.beginPath();ctx.ellipse(0,-(r*.85),r*.22,r*.52,0,0,Math.PI*2);ctx.fillStyle=pc[i%4];ctx.fill();ctx.restore()}ctx.beginPath();ctx.arc(0,0,r*.35,0,Math.PI*2);ctx.fillStyle='#3e2000';ctx.fill();ctx.restore()}
  function mk(){const sf=Math.random()<.15;return{x:Math.random()*W,y:Math.random()*-200,sz:sf?(14+Math.random()*18):(8+Math.random()*14),vx:(Math.random()-.5)*.6,vy:.5+Math.random()*.9,ang:Math.random()*Math.PI*2,va:(Math.random()-.5)*.025,alpha:.4+Math.random()*.45,col:['#f5c800','#ff9500','#ffdf00','#ff6f00','#ffe082'][Math.floor(Math.random()*5)],sf,sw:Math.random()*.4,so:Math.random()*Math.PI*2,t:0}}

function buildPhraseHtml(text){if(!text)return'';return[...text].map((ch,i)=>`<span class="char-unit" data-idx="${i}">${ch===' '?'&nbsp;':ch}</span>`).join('')}
function buildCharMap(phrase){
  const ft=phrase.text||'',tm=new Array([...ft].length).fill(null);
  let cp=0,w=phrase.firstWord;
  while(w){
    const wc=[...(w.text||'')],fc=[...ft];let ws=-1;
    for(let i=cp;i<=fc.length-wc.length;i++){let ok=true;for(let k=0;k<wc.length;k++){if(fc[i+k]!==wc[k]){ok=false;break}}if(ok){ws=i;break}}
    if(ws>=0){cp=ws;let c=w.firstChar,co=0;while(c){const cl=[...(c.text||'')].length;for(let k=0;k<cl;k++){if(cp+co+k<tm.length)tm[cp+co+k]={startTime:c.startTime,endTime:c.endTime,wordStart:ws,wordEnd:ws+wc.length-1}}co+=cl;c=c.next}cp+=wc.length}
    w=w.next;
  }
  return tm;
}

let player=null,phrases=[],currentPhraseIdx=-1,charMaps=[];
let currentPhraseStart=0,currentPhraseEnd=0;

function attachCharListeners(){
  const units=document.querySelectorAll('#lyric-current .char-unit');
  units.forEach((el,i)=>{
    const burst=e=>{e.stopPropagation();el.classList.add('burst');setTimeout(()=>el.classList.remove('burst'),480);spawnIcons(e.clientX||e.touches?.[0]?.clientX||window.innerWidth/2,e.clientY||e.touches?.[0]?.clientY||window.innerHeight/2,4)};
    el.addEventListener('click',burst);
    el.addEventListener('touchend',e=>{e.preventDefault();burst(e);},{passive:false});
    el.addEventListener('dblclick',e=>{
      e.stopPropagation();const tm=charMaps[currentPhraseIdx];if(!tm||!tm[i])return;
      const{wordStart,wordEnd}=tm[i];
      units.forEach((u,j)=>{if(j>=wordStart&&j<=wordEnd){u.classList.add('word-glow');setTimeout(()=>u.classList.remove('word-glow'),750)}});
      spawnIcons(e.clientX,e.clientY,6);
    });
  });
}

function updatePhrase(idx){
  if(idx===currentPhraseIdx)return;currentPhraseIdx=idx;
  $prev.innerHTML   =phrases[idx-1]?.text?buildPhraseHtml(phrases[idx-1].text):'';
  $current.innerHTML=phrases[idx]?.text  ?buildPhraseHtml(phrases[idx].text):'';
  $next.innerHTML   =phrases[idx+1]?.text?buildPhraseHtml(phrases[idx+1].text):'';
  attachCharListeners();
  if(phrases[idx]){currentPhraseStart=phrases[idx].startTime;currentPhraseEnd=phrases[idx].endTime;$phraseWrap.classList.add('visible')}
  spawnBurstRing();if(burstMode)spawnIcons(window.innerWidth/2,window.innerHeight*.38,5);
}

function highlightChars(pos,pi){
  const tm=charMaps[pi];if(!tm)return;
  const units=document.querySelectorAll('#lyric-current .char-unit');
  units.forEach((el,i)=>{
    const t=tm[i];if(!t){el.classList.remove('active','passed');return}
    if(pos>=t.startTime&&pos<t.endTime){el.classList.add('active');el.classList.remove('passed')}
    else if(pos>=t.endTime){el.classList.remove('active');el.classList.add('passed')}
    else{el.classList.remove('active','passed')}
  });
  if(currentPhraseEnd>currentPhraseStart){
    const pct=Math.min(100,Math.max(0,((pos-currentPhraseStart)/(currentPhraseEnd-currentPhraseStart))*100));
    $phraseBar.style.width=pct+'%';
  }
}
function clearHighlight(){document.querySelectorAll('#lyric-current .char-unit').forEach(el=>el.classList.remove('active','passed'));$phraseWrap.classList.remove('visible');$phraseBar.style.width='0%'}

/* ════ PLAYER ════ */
function initPlayer(){
  const{Player}=TextAliveApp;
  player=new Player({app:{token:"E96Wa5egutbj0ueY"},mediaElement:document.createElement('audio'),mediaBannerPosition:'top left'});
  player.addListener({
    onAppReady(app){if(!app.managed)loadSong($songSel.value);$loading.classList.add('hidden')},
    onVideoReady(v){phrases=[];charMaps=[];let p=v.firstPhrase;while(p){phrases.push(p);charMaps.push(buildCharMap(p));p=p.next}currentPhraseIdx=-1;$current.innerHTML='<i class="fa-solid fa-music"></i>';$prev.innerHTML='';$next.innerHTML=''},
    onTimerReady(){$songTitle.textContent=SONGS[$songSel.value]?.name||'—';duration=player.video?.duration||0},
    onTimeUpdate(pos){
      if(!player.video)return;duration=player.video.duration||duration;
      if(duration>0){const pct=(pos/duration)*100;$progressBar.style.width=pct+'%';$progressTh.style.setProperty('--pct',pct+'%')}
      let found=-1;for(let i=0;i<phrases.length;i++){if(pos>=phrases[i].startTime&&pos<phrases[i].endTime){found=i;break}}
      if(found>=0){updatePhrase(found);highlightChars(pos,found)}else clearHighlight();
    },
    onBeat(){
      $beatPulse.classList.add('on');setTimeout(()=>$beatPulse.classList.remove('on'),100);
      $beat.classList.add('on');spawnRipple();setTimeout(()=>$beat.classList.remove('on'),130);
      // Miku subtle pulse on beat
      $mikuImg.classList.add('on-beat');setTimeout(()=>$mikuImg.classList.remove('on-beat'),200);
    },
    onChord(chord){if(chord?.name){$chord.textContent=chord.name;$chord.classList.add('visible');clearTimeout($chord._t);$chord._t=setTimeout(()=>$chord.classList.remove('visible'),1400)}},
    onPlay(){animateEq()},
    onPause(){stopEq()},
    onStop(){stopEq();$progressBar.style.width='0%';$progressTh.style.setProperty('--pct','0%');$current.innerHTML='<i class="fa-solid fa-music"></i>';$prev.innerHTML='';$next.innerHTML='';clearHighlight()}
  });
}

function loadSong(key){
  const song=SONGS[key];if(!song||!player)return;
  applyTheme(currentTheme,song.st);$songTitle.textContent=song.name;$loading.classList.remove('hidden');
  player.createFromSongUrl(song.url,{video:song.video})
    .then(()=>$loading.classList.add('hidden'))
    .catch(err=>{console.error(err);$loading.classList.add('hidden')});
}

document.getElementById('btn-play') .addEventListener('click',()=>player?.requestPlay());
document.getElementById('btn-pause').addEventListener('click',()=>player?.requestPause());
document.getElementById('btn-stop') .addEventListener('click',()=>player?.requestStop());
$songSel.addEventListener('change',()=>{player?.requestStop();loadSong($songSel.value)});

/* ════ KEYBOARD ════ */
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='SELECT'||e.target.tagName==='INPUT')return;
  switch(e.code){
    case'Space':   e.preventDefault();player?.isPlaying?player.requestPause():player?.requestPlay();break;
    case'KeyP':    player?.requestPlay();break;
    case'KeyS':    player?.requestStop();break;
    case'KeyT':    $toggle.click();break;
    case'KeyE':    document.getElementById('btn-burst').click();break;
    case'KeyW':    document.getElementById('btn-shake').click();break;
    case'KeyB':    document.getElementById('btn-size').click();break;
    case'KeyC':    document.getElementById('btn-chorus').click();break;
    case'KeyR':    document.getElementById('btn-react-toggle').click();break;
    case'KeyV':    document.getElementById('btn-vote-open').click();break;
    case'ArrowRight':if(player&&duration){player.requestMediaSeek(Math.min(duration,(player.timer?.position||0)+5000));showNotif('<i class="fa-solid fa-forward"></i> &nbsp;+5s')}break;
    case'ArrowLeft': if(player&&duration){player.requestMediaSeek(Math.max(0,(player.timer?.position||0)-5000));showNotif('<i class="fa-solid fa-backward"></i> &nbsp;-5s')}break;
    default:if(e.code.startsWith('Digit')){const n=parseInt(e.key)-1;if(n>=0&&n<=5)applyTheme(currentTheme,n)}
  }
});

/* ════ SWIPE ════ */
let swipeStartX=0,swipeStartY=0;
document.addEventListener('touchstart',e=>{swipeStartX=e.touches[0].clientX;swipeStartY=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-swipeStartX,dy=e.changedTouches[0].clientY-swipeStartY;
  if(Math.abs(dx)>85&&Math.abs(dx)>Math.abs(dy)*1.5)applyTheme(currentTheme==='sun'?'star':'sun',currentSt);
},{passive:true});

/* ════ INIT ════ */
buildPalette();
initPlayer();
</script>
</body>
