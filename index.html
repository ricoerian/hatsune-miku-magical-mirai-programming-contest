<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Magical Mirai 2026 · Lyric App · Rico Eriansyah</title>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<script src="https://unpkg.com/textalive-app-api/dist/index.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Kurenaido&family=Noto+Serif+JP:wght@300;400;700&display=swap');

/* ════════════════════════════════════════
   THEME VARIABLES
════════════════════════════════════════ */
body.theme-sun {
  --bg:#ffffff; --surface:#f5f0e8;
  --c1:#e8a000; --c2:#f5c800; --c3:#ff9500; --accent:#ff6d00;
  --text:#1a0e00; --text-lyric:#1a0e00; --text-inv:#ffffff; --muted:#b89060;
  --ctrl-bg:rgba(255,255,255,0.9); --ctrl-border:rgba(232,160,0,0.35);
  --select-bg:rgba(245,240,232,0.97); --banner-bg:rgba(255,255,255,0.9);
  --banner-border:rgba(232,160,0,0.3); --shadow-col:rgba(232,160,0,0.18);
  --char-active:#ff6d00; --char-passed:#c98a20; --char-default:#1a0e00;
  --pulse-col:rgba(255,180,0,0.08);
  --portrait-active:rgba(255,180,0,1);
  --portrait-placed:rgba(200,130,0,0.75);
  --portrait-empty:rgba(180,120,0,0.08);
}
body.theme-star {
  --bg:#000000; --surface:#080812;
  --c1:#39c5bb; --c2:#0ff0e4; --c3:#00fff7; --accent:#00e5ff;
  --text:#e8e0ff; --text-lyric:#e8e0ff; --text-inv:#000000; --muted:#3a4a5a;
  --ctrl-bg:rgba(0,0,0,0.88); --ctrl-border:rgba(57,197,187,0.25);
  --select-bg:rgba(8,8,18,0.95); --banner-bg:rgba(0,0,0,0.8);
  --banner-border:rgba(57,197,187,0.2); --shadow-col:rgba(57,197,187,0.15);
  --char-active:#00fff7; --char-passed:#5ee7df; --char-default:#e8e0ff;
  --pulse-col:rgba(57,197,187,0.07);
  --portrait-active:rgba(0,255,247,1);
  --portrait-placed:rgba(57,197,187,0.72);
  --portrait-empty:rgba(57,197,187,0.06);
}

/* per-song color overrides */
body.theme-sun.st-0{--c1:#e8a000;--c2:#f5c800;--c3:#ff9500;--accent:#ff6d00;--char-active:#ff6d00;--portrait-active:rgba(255,140,0,1);--portrait-placed:rgba(200,110,0,0.72)}
body.theme-sun.st-1{--c1:#d4880a;--c2:#f0a830;--c3:#ffe0a0;--accent:#b85c00;--portrait-active:rgba(210,130,10,1);--portrait-placed:rgba(170,90,0,0.72)}
body.theme-sun.st-2{--c1:#e06000;--c2:#ff8c30;--c3:#ffc080;--accent:#c04000;--portrait-active:rgba(220,90,0,1);--portrait-placed:rgba(180,60,0,0.72)}
body.theme-sun.st-3{--c1:#c07a00;--c2:#e0a020;--c3:#f0c060;--accent:#9a5500;--portrait-active:rgba(190,120,0,1);--portrait-placed:rgba(150,85,0,0.72)}
body.theme-sun.st-4{--c1:#e0b800;--c2:#f5d800;--c3:#fff080;--accent:#d08000;--portrait-active:rgba(224,184,0,1);--portrait-placed:rgba(180,140,0,0.72)}
body.theme-sun.st-5{--c1:#c85000;--c2:#e87020;--c3:#ffa060;--accent:#a03000;--portrait-active:rgba(200,80,0,1);--portrait-placed:rgba(160,50,0,0.72)}
body.theme-star.st-0{--c1:#39c5bb;--c2:#0ff0e4;--c3:#00fff7;--accent:#00e5ff;--portrait-active:rgba(0,255,247,1);--portrait-placed:rgba(57,197,187,0.72)}
body.theme-star.st-1{--c1:#7c5cbf;--c2:#b08fff;--c3:#d4b4ff;--accent:#a855f7;--portrait-active:rgba(212,180,255,1);--portrait-placed:rgba(160,100,220,0.72)}
body.theme-star.st-2{--c1:#e85d8a;--c2:#ff8cb0;--c3:#ffc2d8;--accent:#f43f8e;--portrait-active:rgba(255,194,216,1);--portrait-placed:rgba(220,90,140,0.72)}
body.theme-star.st-3{--c1:#f0a500;--c2:#ffc84a;--c3:#ffe399;--accent:#f59e0b;--portrait-active:rgba(255,227,153,1);--portrait-placed:rgba(220,165,0,0.72)}
body.theme-star.st-4{--c1:#3da8e0;--c2:#7ecfff;--c3:#b5e8ff;--accent:#0ea5e9;--portrait-active:rgba(181,232,255,1);--portrait-placed:rgba(62,168,224,0.72)}
body.theme-star.st-5{--c1:#e05050;--c2:#ff8080;--c3:#ffb8b8;--accent:#ef4444;--portrait-active:rgba(255,184,184,1);--portrait-placed:rgba(220,80,80,0.72)}

/* ── Reset & base ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-text-size-adjust:100%}
body{
  font-family:'Zen Kurenaido','Noto Serif JP',serif;
  background:var(--bg);color:var(--text);
  width:100%;height:100%;min-height:100dvh;
  overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;
  transition:background .7s,color .5s;
  cursor:default;
}
@media(hover:hover){body{cursor:none}}

/* ── Custom cursor ── */
#cursor,#cursor-dot{display:none}
@media(hover:hover){
  #cursor{
    display:block;position:fixed;pointer-events:none;z-index:9999;
    width:18px;height:18px;border:2px solid var(--c1);border-radius:50%;
    transform:translate(-50%,-50%);
    transition:border-color .3s,width .15s,height .15s;
    mix-blend-mode:difference;
  }
  #cursor.clicking{width:10px;height:10px}
  #cursor-dot{
    display:block;position:fixed;pointer-events:none;z-index:9999;
    width:4px;height:4px;background:var(--c1);border-radius:50%;
    transform:translate(-50%,-50%);transition:background .3s;
  }
  body{cursor:none}
}

/* ── Mouse trail ── */
.trail-icon{
  position:fixed;pointer-events:none;z-index:9990;
  font-size:.6rem;color:var(--c1);opacity:0;
  transform:translate(-50%,-50%);
  animation:trail-fade .7s ease forwards;
  filter:drop-shadow(0 0 3px var(--accent));
}
@keyframes trail-fade{
  0%{opacity:.8;transform:translate(-50%,-50%) scale(1)}
  100%{opacity:0;transform:translate(-50%,-120%) scale(.3)}
}

/* ════ BACKGROUND LAYERS ════ */
#bg-layer{position:fixed;inset:0;z-index:0;pointer-events:none;transition:opacity .8s}
body.theme-sun  #bg-layer{background:radial-gradient(ellipse 70% 55% at 50% -5%,rgba(255,200,50,.15) 0%,rgba(255,140,0,.06) 40%,transparent 70%),radial-gradient(ellipse 100% 40% at 50% 110%,rgba(255,160,0,.05) 0%,transparent 60%)}
body.theme-star #bg-layer{background:radial-gradient(ellipse 60% 50% at 50% -5%,rgba(30,80,120,.35) 0%,rgba(10,20,60,.2) 50%,transparent 75%),radial-gradient(ellipse 80% 30% at 80% 80%,rgba(57,197,187,.08) 0%,transparent 60%)}

#beat-pulse{position:fixed;inset:0;z-index:2;pointer-events:none;background:var(--pulse-col);opacity:0;transition:opacity .05s}
#beat-pulse.on{opacity:1}

/* ── Sun orb ── */
#sun-orb,#sun-rays{
  position:fixed;top:-90px;left:50%;
  transform:translateX(-50%);
  width:min(240px,80vw);height:min(240px,80vw);
  pointer-events:none;z-index:1;transition:opacity .8s;
}
#sun-orb{
  border-radius:50%;
  background:radial-gradient(circle,#fff7cc 0%,#ffe033 35%,#ff9500 65%,transparent 100%);
  box-shadow:0 0 80px 30px rgba(255,180,0,.3),0 0 160px 60px rgba(255,140,0,.12);
  animation:sun-breathe 4s ease-in-out infinite;
}
@keyframes sun-breathe{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.06)}}
#sun-rays{animation:rays-spin 20s linear infinite}
#sun-rays::before{
  content:'';position:absolute;top:50%;left:50%;
  width:700px;height:700px;transform:translate(-50%,-50%);
  background:repeating-conic-gradient(from 0deg,rgba(245,200,0,.04) 0deg 12deg,transparent 12deg 24deg);
  border-radius:50%;
}
@keyframes rays-spin{to{transform:translateX(-50%) rotate(360deg)}}
body.theme-star #sun-orb,body.theme-star #sun-rays{opacity:0}
body.theme-sun  #sun-orb,body.theme-sun  #sun-rays{opacity:1}

/* ── Canvases ── */
#petals-canvas,#star-canvas,#bin-canvas{position:fixed;inset:0;z-index:1;pointer-events:none;transition:opacity .7s}
body.theme-sun  #petals-canvas{opacity:.6} body.theme-sun  #star-canvas{opacity:0}  body.theme-sun  #bin-canvas{opacity:.03}
body.theme-star #petals-canvas{opacity:0}  body.theme-star #star-canvas{opacity:1}  body.theme-star #bin-canvas{opacity:.07}

/* ════════════════════════════════════════
   PORTRAIT CANVAS — CENTER STAGE
════════════════════════════════════════ */
#portrait-wrap{
  position:fixed;
  inset:0;
  z-index:3;
  pointer-events:none;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:opacity .6s;
}
#portrait-canvas{
  display:block;
  /* will be sized by JS to fill viewport preserving aspect ratio */
  max-width:100vw;
  max-height:100dvh;
  transition:transform 1.2s cubic-bezier(.22,1,.36,1), opacity .6s;
  transform-origin:center center;
}

/* ── EQ bars ── */
#eq-wrap{
  position:fixed;bottom:0;left:0;right:0;
  height:clamp(32px,5vw,52px);
  display:flex;align-items:flex-end;justify-content:center;
  gap:2px;z-index:2;pointer-events:none;
}
.eq-bar{width:clamp(2px,0.6vw,4px);border-radius:2px 2px 0 0;background:linear-gradient(to top,var(--accent),var(--c2));height:3px;transition:height .09s}
body.theme-sun  .eq-bar{opacity:.3}
body.theme-star .eq-bar{opacity:.5}

/* ════ STAGE & LYRIC WRAP ════ */
#stage{
  position:relative;z-index:4;
  width:100vw;height:100dvh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;
}

/* Current lyric overlay — shown at bottom center */
#lyric-overlay{
  position:fixed;
  bottom:calc(env(safe-area-inset-bottom,0px) + 7.5rem);
  left:50%;
  transform:translateX(-50%);
  z-index:10;
  text-align:center;
  pointer-events:none;
  width:min(90vw,700px);
  transition:opacity .4s;
}

/* The "big current" lyric shown as highlight */
#lyric-current-overlay{
  font-size:clamp(1.2rem,4vw,2rem);
  font-weight:700;
  letter-spacing:.1em;
  color:var(--char-active);
  text-shadow:0 0 18px var(--accent), 0 0 36px var(--c2);
  animation:line-in-overlay .45s cubic-bezier(.22,1,.36,1);
  line-height:1.5;
  word-break:break-word;
  font-family:'Zen Kurenaido','Noto Serif JP',serif;
}
@keyframes line-in-overlay{
  0%{opacity:0;transform:translateY(14px) scale(.93)}
  60%{opacity:1;transform:translateY(-3px) scale(1.03)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
.char-unit{
  display:inline-block;
  transition:color .06s,transform .12s;
  position:relative;
  will-change:transform;
}
.char-unit.active{
  color:var(--char-active);
  transform:translateY(-4px) scale(1.18);
  animation:char-pop-ov .2s cubic-bezier(.22,1,.36,1);
}
body.theme-sun .char-unit.active{text-shadow:0 0 6px rgba(255,140,0,.7)}
body.theme-star .char-unit.active{text-shadow:0 0 8px var(--c3)}
@keyframes char-pop-ov{0%{transform:translateY(0) scale(.9)}50%{transform:translateY(-7px) scale(1.28)}100%{transform:translateY(-4px) scale(1.18)}}
.char-unit.passed{color:var(--char-passed);opacity:.6}

/* ── Beat indicator ── */
#beat-indicator{
  position:fixed;top:env(safe-area-inset-top,0px);
  margin-top:calc(env(safe-area-inset-top,0px) + .7rem);
  right:clamp(.75rem,3vw,1.5rem);
  width:12px;height:12px;border-radius:50%;
  background:var(--c2);box-shadow:0 0 14px var(--c2),0 0 30px var(--accent);
  opacity:0;z-index:10;transition:opacity .05s;
}
#beat-indicator.on{opacity:1}

/* ── Chord badge ── */
#chord-badge{
  position:fixed;
  bottom:calc(env(safe-area-inset-bottom,0px) + 6rem);
  left:50%;
  font-size:.7rem;letter-spacing:.18em;
  color:var(--c1);opacity:0;
  transition:opacity .25s,transform .25s;
  z-index:10;
  padding:.2rem .8rem;border-radius:20px;
  border:1px solid var(--ctrl-border);
  background:var(--ctrl-bg);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  white-space:nowrap;
  transform:translateX(-50%) scale(.9);
}
#chord-badge.visible{opacity:1;transform:translateX(-50%) scale(1)}

/* ── Phrase micro-bar ── */
#phrase-bar-wrap{
  position:fixed;left:50%;transform:translateX(-50%);
  bottom:calc(env(safe-area-inset-bottom,0px) + 5.2rem);
  width:min(280px,55vw);height:2px;
  background:var(--ctrl-border);border-radius:2px;
  z-index:10;opacity:0;transition:opacity .3s;
}
#phrase-bar-wrap.visible{opacity:.65}
#phrase-bar-inner{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--c1),var(--c3));width:0%;transition:width .1s linear}

/* ════════════════════════════════════════
   THEME TOGGLE
════════════════════════════════════════ */
#theme-toggle{
  width:100%;
  position:relative;display:flex;align-items:center;
  background:var(--ctrl-bg);border:1.5px solid var(--c1);
  border-radius:30px;padding:3px;
  cursor:pointer;
  z-index:25;
  transition:border-color .5s,background .5s,box-shadow .3s;
  min-width:100px;height:38px;flex-shrink:0;user-select:none;
  box-shadow:0 2px 12px var(--shadow-col);
  touch-action:manipulation;
}
@media(hover:hover){#theme-toggle{cursor:none}}
#theme-toggle:hover{box-shadow:0 4px 20px var(--shadow-col),0 0 0 2px var(--c1)}
#theme-toggle .t-opt{
  flex:1;text-align:center;font-family:inherit;
  font-size:.58rem;letter-spacing:.06em;
  padding:.25rem .35rem;border-radius:26px;color:var(--muted);
  transition:color .3s,background .3s,box-shadow .3s;
  white-space:nowrap;line-height:1.3;
  pointer-events:none;
}
#theme-toggle .t-opt.active{color:var(--text-inv);background:var(--c1);box-shadow:0 0 14px var(--c1);font-weight:700}
#theme-toggle .t-opt i{font-size:.72rem}

/* ════════════════════════════════════════
   CONTROLS — MOBILE FIRST
════════════════════════════════════════ */
#controls{
  position:fixed;
  bottom:calc(env(safe-area-inset-bottom,0px) + .6rem);
  left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;
  gap:.4rem;
  z-index:20;
  width:calc(100% - 1.2rem);
  max-width:480px;
  background:var(--ctrl-bg);
  border:1px solid var(--ctrl-border);
  padding:.55rem .7rem;
  border-radius:18px;
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  transition:background .5s,border-color .5s;
  box-shadow:0 4px 30px var(--shadow-col);
}
#row-top{display:flex;gap:.45rem;width:100%;align-items:center}
#btn-row{display:flex;gap:.45rem;width:100%}

.btn{
  background:transparent;border:1.5px solid var(--c1);color:var(--c1);
  font-family:inherit;font-size:.65rem;letter-spacing:.1em;
  padding:.4rem .6rem;
  border-radius:14px;
  transition:background .2s,color .2s,box-shadow .2s,transform .1s;
  flex:1;min-height:40px;
  touch-action:manipulation;
  cursor:pointer;
}
@media(hover:hover){.btn{cursor:none}}
.btn:hover,.btn:focus{background:var(--c1);color:var(--text-inv);box-shadow:0 0 18px var(--c1);outline:none;transform:translateY(-1px)}
.btn:active{transform:scale(.94)}
.btn i{font-size:.78rem;pointer-events:none}

#song-select{
  width: 50%;
  flex:1;
  background:var(--select-bg);border:1px solid var(--ctrl-border);
  color:var(--text);font-family:inherit;
  padding:.4rem .6rem;border-radius:14px;
  min-height:40px;font-size:max(16px,.75rem);
  transition:background .5s,border-color .5s;
  cursor:pointer;
  appearance:auto;
  -webkit-appearance:auto;
}

@media(min-width:600px){
  #controls{
    flex-direction:row;flex-wrap:wrap;justify-content:center;
    width:auto;max-width:560px;
    padding:.6rem 1rem;border-radius:28px;
    bottom:calc(env(safe-area-inset-bottom,0px) + 1rem);
    gap:.55rem;
  }
  #row-top,#btn-row{width:auto;flex:none}
  .btn{flex:none;font-size:.7rem;padding:.45rem 1rem;min-height:36px}
  #song-select{flex:none;width:auto;min-width:160px;max-width:200px;font-size:.7rem;min-height:36px}
  #theme-toggle{height:36px;min-width:110px}
}

@media(min-width:1024px){
  #controls{
    flex-direction:row;flex-wrap:nowrap;
    max-width:none;padding:.65rem 1.4rem;
    border-radius:40px;
    bottom:calc(env(safe-area-inset-bottom,0px) + 1.4rem);
    gap:.85rem;
  }
  .btn{font-size:.72rem;padding:.48rem 1.1rem}
  #song-select{min-width:200px;max-width:240px;font-size:.72rem}
}

/* ════ PROGRESS BAR ════ */
#progress-track{
  position:fixed;bottom:0;left:0;right:0;
  height:5px;
  background:rgba(128,128,128,.12);
  z-index:30;
  cursor:pointer;
  transition:height .2s;
}
@media(hover:hover){#progress-track{cursor:none}}
#progress-track:hover{height:8px}
#progress-bar{
  height:100%;
  background:linear-gradient(90deg,var(--accent),var(--c1),var(--c3));
  width:0%;transition:width .25s linear;
  box-shadow:0 0 8px var(--c2);
  pointer-events:none;
}
#progress-thumb{
  position:absolute;right:calc(100% - var(--pct,0%));top:50%;
  width:14px;height:14px;border-radius:50%;background:var(--c1);
  transform:translate(50%,-50%) scale(0);
  transition:transform .15s;pointer-events:none;
  box-shadow:0 0 8px var(--c1);
}
#progress-track:hover #progress-thumb{transform:translate(50%,-50%) scale(1)}
@media(hover:none){#progress-thumb{transform:translate(50%,-50%) scale(0.85)}}

/* ════ INFO BANNER ════ */
#info-banner{
  position:fixed;
  top:calc(env(safe-area-inset-top,0px) + .6rem);
  left:50%;transform:translateX(-50%);
  text-align:center;z-index:10;
  background:var(--banner-bg);border:1px solid var(--banner-border);
  padding:.28rem .9rem;border-radius:14px;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  max-width:calc(100% - 3.5rem);
  transition:background .5s,border-color .5s;
  box-shadow:0 2px 16px var(--shadow-col);
}
#info-banner .label-top{
  font-size:.5rem;letter-spacing:.22em;color:var(--c1);
  text-transform:uppercase;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;
  transition:color .5s;
}
#info-banner .song-name{
  font-size:.8rem;color:var(--text);letter-spacing:.07em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:55vw;
}
@media(min-width:600px){
  #info-banner{top:calc(env(safe-area-inset-top,0px) + 1rem);padding:.3rem 1.1rem}
  #info-banner .label-top{font-size:.54rem;letter-spacing:.25em}
  #info-banner .song-name{font-size:.88rem;max-width:70vw}
}
@media(min-width:1024px){
  #info-banner{top:calc(env(safe-area-inset-top,0px) + 1.3rem);padding:.38rem 1.3rem;border-radius:18px}
  #info-banner .label-top{font-size:.58rem;letter-spacing:.28em}
  #info-banner .song-name{font-size:.98rem;max-width:none}
}

/* ════ REACTION BAR ════ */
#reaction-bar{
  position:fixed;left:50%;transform:translateX(-50%);
  bottom:calc(env(safe-area-inset-bottom,0px) + 7.5rem);
  display:flex;gap:.4rem;align-items:center;
  z-index:15;
  opacity:0;pointer-events:none;
  transition:opacity .4s,transform .4s;
  transform:translateX(-50%) translateY(8px);
}
#reaction-bar.visible{opacity:1;pointer-events:all;transform:translateX(-50%) translateY(0)}
@media(min-width:600px){
  #reaction-bar{bottom:calc(env(safe-area-inset-bottom,0px) + 7rem)}
}

.react-btn{
  display:flex;flex-direction:column;align-items:center;gap:.2rem;
  background:var(--ctrl-bg);border:1px solid var(--ctrl-border);
  padding:.4rem .6rem;border-radius:14px;
  cursor:pointer;
  transition:background .2s,transform .15s,box-shadow .2s;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  min-width:44px;min-height:44px;
  touch-action:manipulation;
}

};

/* ════ DOM refs ════ */
const $loading       = document.getElementById('loading');
const $songTitle     = document.getElementById('song-title');
const $beat          = document.getElementById('beat-indicator');
const $beatPulse     = document.getElementById('beat-pulse');
const $chord         = document.getElementById('chord-badge');

const $cursorDot     = document.getElementById('cursor-dot');

let currentTheme='star', currentSt=0;
let burstMode=false, chorusMode=false, reactionOpen=false, duration=0;

/* ════════════════════════════════════════
   LYRIC PORTRAIT SYSTEM
════════════════════════════════════════ */
const Portrait = (function(){
  const canvas = $portraitCanvas;
  const ctx    = canvas.getContext('2d');

  // Portrait image pixel data (sampled)
  let imgW = 0, imgH = 0;
  let alphaMap = null;     // Uint8Array — alpha value per pixel
  let colorMap = null;     // Array of {r,g,b} — actual pixel color from source image
  let sourceImg = null;    // Stored Image object for direct rendering during reveal
  let revealOpacity = 0;   // Track image fade-in during reveal
  let slots = [];          // [{nx,ny,fontSize,placed,char,active,opacity,glow,colorR,colorG,colorB}]
  let slotIdx = 0;         // next slot to fill
  let totalExpChars = 1;   // total expected lyric characters
  let slotsPerChar = 1;    // how many slots each lyric character fills

  // Canvas logical size
  let cW = 0, cH = 0;
  // Zoom state
  let zoomScale = 1;
  let zoomTargetScale = 1;
  let zoomOffX = 0, zoomOffY = 0;
  let zoomAnimating = false;
  let isZoomedOut = false;

  // Colors (updated by theme)
  let colActive  = 'rgba(255,180,0,1)';
  let colPlaced  = 'rgba(200,130,0,0.75)';
  let colEmpty   = 'rgba(180,120,0,0.06)';
  let colGlow    = 'rgba(255,200,0,0.9)';

  // Last rendered phrase position (for highlight)
  let activeSlotIdx = -1;

  // Phrase-end zoom timer
  let zoomOutTimer = null;
  let zoomInTimer  = null;

  /* ── Load image and build slot grid ── */
  function load(src){
    return new Promise(resolve=>{
      const img = new Image();
      sourceImg = img;
      if(src.startsWith('http')) img.crossOrigin = 'anonymous';
      img.onload = ()=>{
        // Higher resolution sampling for more detail
        const SAMPLE_W = 640, SAMPLE_H = Math.round(SAMPLE_W * img.naturalHeight / img.naturalWidth);
        const off = document.createElement('canvas');
        off.width  = SAMPLE_W;
        off.height = SAMPLE_H;
        const oc = off.getContext('2d');
        oc.drawImage(img, 0, 0, SAMPLE_W, SAMPLE_H);
        const data = oc.getImageData(0,0,SAMPLE_W,SAMPLE_H).data;
        imgW = SAMPLE_W; imgH = SAMPLE_H;
        alphaMap = new Uint8Array(SAMPLE_W * SAMPLE_H);
        colorMap = new Array(SAMPLE_W * SAMPLE_H);
        for(let i=0;i<SAMPLE_W*SAMPLE_H;i++){
          const r=data[i*4], g=data[i*4+1], b=data[i*4+2], a=data[i*4+3];
          // Store the actual pixel color for coloring lyrics
          colorMap[i] = {r, g, b};
          // Support both: transparent bg (use alpha) OR black bg (use brightness)
          if(a < 250){
            alphaMap[i] = a;
          } else {
            const brightness = r + g + b;
            alphaMap[i] = brightness > 15 ? Math.min(255, brightness) : 0;
          }
        }
        // If slots already exist, refresh their colors from the new map
        if(slots.length > 0){
          slots.forEach(s => {
            const gx = Math.floor(s.nx * (imgW-1));
            const gy = Math.floor(s.ny * (imgH-1));
            const pIdx = gy * imgW + gx;
            const col = colorMap[pIdx];
            if(col){ s.colorR = col.r; s.colorG = col.g; s.colorB = col.b; }
          });
        }
        resolve();
      };
      img.onerror = ()=>{ console.warn('Portrait image not found:', src); resolve(); };
      img.src = src;
    });
  }

  /* ── Build slot positions ── */
  function buildSlots(targetCount, expectedChars, fontMin, fontMax){
    slots = [];
    if(!alphaMap || !colorMap) return;

    totalExpChars = expectedChars || 1;
    const ALPHA_THRESH = 30;
    const FONT_MIN = fontMin || 5;
    const FONT_MAX = fontMax || 9;

    // Collect ALL valid pixel positions top→bottom, left→right
    const candidates = [];
    for(let gy=0; gy<imgH; gy++){
      for(let gx=0; gx<imgW; gx++){
        if(alphaMap[gy*imgW+gx] >= ALPHA_THRESH){
          candidates.push({nx: gx/imgW, ny: gy/imgH, gx, gy});
        }
      }
    }

    if(!candidates.length){ slotIdx=0; return; }

    // Subsample candidates evenly to match targetCount
    const total = targetCount || 300;
    const step  = Math.max(1, Math.floor(candidates.length / total));

    // local density helper for font sizing
    function localDensity(gx, gy){
      const R = 3; let count=0, tot=0;
      for(let dy=-R;dy<=R;dy++) for(let dx=-R;dx<=R;dx++){
        const px=gx+dx, py=gy+dy;
        if(px<0||px>=imgW||py<0||py>=imgH) continue;
        tot++;
        if(alphaMap[py*imgW+px]>=ALPHA_THRESH) count++;
      }
      return tot>0 ? count/tot : 0;
    }

    for(let i=0; i<candidates.length; i+=step){
      if(slots.length >= total) break;
      const c = candidates[i];
      const dens = localDensity(c.gx, c.gy);
      const fs = Math.round(FONT_MIN + (FONT_MAX - FONT_MIN) * dens);
      // Get the actual pixel color from the source image
      const pixelIdx = c.gy * imgW + c.gx;
      const col = colorMap[pixelIdx] || {r:200,g:200,b:200};
      slots.push({
        nx: c.nx,
        ny: c.ny,
        fontSize: fs,
        origFontSize: fs,
        char: '',
        placed: false,
        active: false,
        opacity: 0,
        glowIntensity: 0,
        placedAt: 0,
        colorR: col.r,
        colorG: col.g,
        colorB: col.b
      });
    }
    slotIdx = 0;
    // Compute how many slots each lyric character should fill
    slotsPerChar = Math.max(1, Math.floor(slots.length / totalExpChars));
    console.log(`Portrait: ${slots.length} slots built (target ${total}), slotsPerChar=${slotsPerChar}, font ${FONT_MIN}-${FONT_MAX}px for ${totalExpChars} expected chars`);
  }

  /* ── Resize canvas to fill viewport ── */
  function resize(){
    const vw = window.innerWidth, vh = window.innerHeight;
    // Portrait aspect ratio from image
    const aspect = imgH > 0 ? imgH/imgW : 1.6;
    // Fit into viewport with some padding
    const maxH = vh * 0.88;
    const maxW = vw * 0.88;
    let w = maxW, h = w * aspect;
    if(h > maxH){ h = maxH; w = h / aspect; }
    cW = Math.round(w); cH = Math.round(h);
    canvas.width  = cW;
    canvas.height = cH;
    canvas.style.width  = cW + 'px';
    canvas.style.height = cH + 'px';
  }

  /* ── Map slot normalized position to canvas coords ── */
  function slotToCanvas(slot){
    return {
      x: slot.nx * cW,
      y: slot.ny * cH
    };
  }

  /* ── Place next N chars from a text (each char fills slotsPerChar slots) ── */
  /* First slot = actual lyric at boosted font; remaining slots = colored dot for density */
  function placeChars(text, count){
    if(!slots.length || !text) return;
    const chars = [...text].filter(c => c.trim());
    const now = performance.now();
    let ci = 0;
    while(ci < chars.length && ci < count){
      for(let r = 0; r < slotsPerChar; r++){
        if(slotIdx >= slots.length) break;
        const slot = slots[slotIdx];
        if(r === 0){
          // Primary: actual lyric character at moderately boosted font
          slot.char     = chars[ci];
          slot.fontSize = Math.min(14, Math.round(slot.origFontSize * 1.6));
          slot.placed   = true;
          slot.active   = true;
          slot.opacity  = 0;
          slot.glowIntensity = 1;
        } else {
          // Secondary: colored dot to maintain portrait density
          slot.char     = '*';
          slot.placed   = true;
          slot.active   = false;
          slot.opacity  = 0.5;
          slot.glowIntensity = 0;
        }
        slot.placedAt = now;
        slotIdx++;
      }
      ci++;
    }
    updateCounter();
  }

  /* ── Place remaining unplaced chars of a phrase instantly ── */
  /* skipCount: how many chars (from start of text) were already placed by highlightOverlay */
  function placeAll(text, skipCount){
    if(!text) return;
    const chars = [...text].filter(c => c.trim());
    const skip = skipCount || 0;
    const now = performance.now();
    for(let ci = skip; ci < chars.length; ci++){
      for(let r = 0; r < slotsPerChar; r++){
        if(slotIdx >= slots.length) return;
        const slot = slots[slotIdx];
        if(r === 0){
          slot.char     = chars[ci];
          slot.fontSize = Math.min(14, Math.round(slot.origFontSize * 1.6));
          slot.placed   = true;
          slot.active   = false;
          slot.opacity  = 1;
          slot.glowIntensity = 0;
        } else {
          slot.char     = '*';
          slot.placed   = true;
          slot.active   = false;
          slot.opacity  = 0.7;
          slot.glowIntensity = 0;
        }
        slot.placedAt = now;
        slotIdx++;
      }
    }
    updateCounter();
  }

  /* ── Fill ALL remaining empty slots with colored dots (ensures 100% without repeating lyrics) ── */
  function fillRemaining(){
    if(slotIdx >= slots.length) return;
    const now = performance.now();
    while(slotIdx < slots.length){
      const slot = slots[slotIdx];
      slot.char    = '*';
      slot.placed  = true;
      slot.active  = false;
      slot.opacity = 0;
      slot.glowIntensity = 0;
      slot.placedAt = now;
      slotIdx++;
    }
    updateCounter();
  }

  function updateCounter(){
    const pct = slots.length > 0 ? Math.round((slotIdx/slots.length)*100) : 0;
    $counter.textContent = `${pct}% FILLED`;
  }

  /* ── Reset for new song ── */
  function resetSlots(){
    slots.forEach(s=>{
      s.char=''; s.placed=false; s.active=false; s.opacity=0; s.glowIntensity=0;
      s.fontSize = s.origFontSize || s.fontSize;
    });
    slotIdx = 0;
    activeSlotIdx = -1;
    isZoomedOut = false;
    zoomAnimating = false;
    clearTimeout(zoomOutTimer);
    clearTimeout(zoomInTimer);
    canvas.style.transition = '';
    canvas.style.transform  = '';
    updateCounter();
  }

  /* ── Mark active slot index for highlight ── */
  function setActiveRange(from, to){
    activeSlotIdx = from;
    slots.forEach((s,i)=>{
      if(i >= from && i < to) s.active = true;
      else if(i < from) s.active = false;
    });
  }

  /* ── Zoom out to show full portrait (3-second cinematic reveal) ── */
  function zoomOut(){
    isZoomedOut = true;
    zoomTargetScale = 1.0;
    zoomAnimating = true;
    canvas.style.transition = 'transform 3s cubic-bezier(.16,1,.3,1)';
    canvas.style.transform  = `scale(${zoomTargetScale}) translate(0,0)`;
    setTimeout(()=>{ zoomAnimating=false; canvas.style.transition=''; }, 3200);

    // Trigger cinematic reveal 3 seconds after zoom out begins
    setTimeout(() => {
      if(typeof PaintReveal !== 'undefined') PaintReveal.trigger(currentTheme);
    }, 3000);
  }

  /* ── Zoom in to follow active lyric placement ── */
  function zoomInToActive(){
    const targetIdx = activeSlotIdx >= 0 ? activeSlotIdx : slotIdx;
    if(!slots[targetIdx] || isZoomedOut) return;
    const slot = slots[targetIdx];
    const {x,y} = slotToCanvas(slot);
    const scl = 1.4;
    const tx = (cW/2 - x) * (scl-1) / scl;
    const ty = (cH/2 - y) * (scl-1) / scl;
    canvas.style.transition = 'transform 1.2s cubic-bezier(.22,1,.36,1)';
    canvas.style.transform  = `scale(${scl}) translate(${tx}px,${ty}px)`;
    isZoomedOut = false;
    setTimeout(()=>{ canvas.style.transition=''; }, 1300);
  }

  /* ── Trigger zoom-out before phrase end ── */
  function scheduleZoomOut(phraseEndTime, currentPos){
    clearTimeout(zoomOutTimer); clearTimeout(zoomInTimer);
    const remaining = phraseEndTime - currentPos;
    const delay = Math.max(0, remaining - 3000); // 3 sec before end
    zoomOutTimer = setTimeout(()=>{
      zoomOut();
    }, delay);
  }

  /* ── Color update ── */
  function updateColors(){
    const style = getComputedStyle(document.body);
    colActive = style.getPropertyValue('--portrait-active').trim() || colActive;
    colPlaced = style.getPropertyValue('--portrait-placed').trim() || colPlaced;
    colEmpty  = style.getPropertyValue('--portrait-empty').trim()  || colEmpty;
  }

  /* ── Draw loop ── */
  function draw(){
    requestAnimationFrame(draw);
    if(!slots.length){ ctx.clearRect(0,0,cW,cH); return; }
    ctx.clearRect(0,0,cW,cH);
    const now = performance.now();

    // Reveal Logic: Fade in the actual source image
    const isRevealing = canvas.classList.contains('revealing');
    if(isRevealing) revealOpacity = Math.min(1, revealOpacity + 0.015);
    else revealOpacity = Math.max(0, revealOpacity - 0.02);

    if(revealOpacity > 0.01 && sourceImg){
      ctx.save();
      ctx.globalAlpha = revealOpacity;
      const aspect = sourceImg.naturalHeight / sourceImg.naturalWidth;
      let iW = cW * 0.94, iH = iW * aspect;
      if(iH > cH * 0.94){ iH = cH * 0.94; iW = iH / aspect; }
      ctx.drawImage(sourceImg, (cW-iW)/2, (cH-iH)/2, iW, iH);
      ctx.restore();
    }

    const lyricAlphaMult = 1 - revealOpacity * 0.7;

    for(let i=0; i<slots.length; i++){
      const s = slots[i];
      const {x, y} = slotToCanvas(s);

      if(!s.placed){
        // Show empty ghost slot — visible dot in the image's own color to preview the image
        ctx.font = `${s.fontSize}px 'Zen Kurenaido', serif`;
        ctx.fillStyle = `rgba(${s.colorR},${s.colorG},${s.colorB},0.25)`;
        ctx.globalAlpha = 1;
        ctx.fillText('·', x, y);
        continue;
      }

      // Fade in
      const age = now - s.placedAt;
      if(s.opacity < 1) s.opacity = Math.min(1, age / 350);

      // Glow decay
      if(s.active && s.glowIntensity > 0){
        s.glowIntensity = Math.max(0, 1 - age / 1000);
      }

      ctx.save();
      ctx.font = `bold ${s.fontSize}px 'Zen Kurenaido', serif`;
      // Use the actual image color for this character
      const charColor = `rgb(${s.colorR},${s.colorG},${s.colorB})`;

      if(s.active && s.glowIntensity > 0.05){
        // Active + glow — bright version of the image color
        const g = s.glowIntensity;
        ctx.globalAlpha = s.opacity * lyricAlphaMult;
        // Brighten the color for glow effect
        const br = Math.min(255, s.colorR + 80 * g);
        const bg = Math.min(255, s.colorG + 80 * g);
        const bb = Math.min(255, s.colorB + 80 * g);
        ctx.shadowColor = `rgba(${br},${bg},${bb},0.8)`;
        ctx.shadowBlur  = 6 * g;
        ctx.fillStyle   = `rgb(${br},${bg},${bb})`;
        // Slight bounce
        const bounce = Math.sin(age / 120) * 1.5 * g;
        ctx.fillText(s.char, x, y - bounce);
      } else {
        // Settled — use the actual image color
        ctx.globalAlpha = s.opacity * (s.active ? 1 : 0.92) * lyricAlphaMult;
        ctx.fillStyle   = charColor;
        ctx.fillText(s.char, x, y);
      }
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  /* ── Public API ── */
  return {
    load, resize, resetSlots, buildSlots,
    placeChars, placeAll, fillRemaining, setActiveRange,
    scheduleZoomOut, zoomOut, zoomInToActive,
    updateColors,
    get slotIdx(){ return slotIdx; },
    get totalSlots(){ return slots.length; },
    get slotsPerChar(){ return slotsPerChar; },
    draw
  };
})();

/* ════ REACTIONS ════ */
const reactions={fire:0,heart:0,star:0,bolt:0};
const rcEls={fire:document.getElementById('rc-fire'),heart:document.getElementById('rc-heart'),star:document.getElementById('rc-star'),bolt:document.getElementById('rc-bolt')};
document.querySelectorAll('.react-btn').forEach(btn=>{
  const trigger=()=>{
    const k=btn.dataset.key;
    reactions[k]++;rcEls[k].textContent=reactions[k];
    btn.classList.add('popped');setTimeout(()=>btn.classList.remove('popped'),380);
    const r=btn.getBoundingClientRect();
    spawnIcons(r.left+r.width/2,r.top,4);
    showNotif(`<i class="fa-solid fa-${k==='fire'?'fire':k==='heart'?'heart':k==='star'?'star':'bolt'}"></i> &nbsp;+1`);
  };
  btn.addEventListener('click',trigger);
  btn.addEventListener('touchend',e=>{e.preventDefault();trigger();},{passive:false});
});
document.getElementById('btn-react-toggle').addEventListener('click',()=>{
  reactionOpen=!reactionOpen;
  $reactionBar.classList.toggle('visible',reactionOpen);
  document.getElementById('btn-react-toggle').classList.toggle('active',reactionOpen);
});

/* ════ SONG SELECTION ════ */
function renderSongs(){
  $songList.innerHTML='';
  Object.keys(SONGS).forEach(key=>{
    const song=SONGS[key];
    const parts=song.name.split(' / ');
    const title=parts[0]||song.name;
    const artist=parts[1]||'Unknown';
    const card=document.createElement('div');
    card.className='song-grid-card';
    card.dataset.key=key;
    card.innerHTML=`<div class="song-grid-img" style="display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:var(--c1)"><i class="fa-solid fa-music"></i></div><div class="song-grid-title">${title}</div><div class="song-grid-artist">${artist}</div>`;
    const selectSong=()=>{
      userSelectedKey=key;
      if(playerReady) loadSong(key);
      $songPanel.classList.remove('visible');
    };
    card.addEventListener('click',selectSong);
    card.addEventListener('touchend',e=>{e.preventDefault();selectSong();},{passive:false});
    $songList.appendChild(card);
  });
}
renderSongs();
document.getElementById('btn-song-open').addEventListener('click',()=>$songPanel.classList.add('visible'));
document.getElementById('song-close').addEventListener('click',()=>$songPanel.classList.remove('visible'));
$songPanel.addEventListener('click',e=>{if(e.target===$songPanel)$songPanel.classList.remove('visible')});

}

/* ════ PALETTE ════ */
const SUN_COLORS =['#e8a000','#d4880a','#e06000','#c07a00','#e0b800','#c85000'];
const STAR_COLORS=['#39c5bb','#7c5cbf','#e85d8a','#f0a500','#3da8e0','#e05050'];
function buildPalette(){
  $palette.innerHTML='';
  const cols=currentTheme==='sun'?SUN_COLORS:STAR_COLORS;
  cols.forEach((col,i)=>{
    const d=document.createElement('div');
    d.className='pal-dot'+(i===currentSt?' active':'');
    d.style.background=col;d.title=`Color ${i+1}`;
    const apply=()=>applyTheme(currentTheme,i);
    d.addEventListener('click',apply);
    d.addEventListener('touchend',e=>{e.preventDefault();apply();},{passive:false});
    $palette.appendChild(d);
  });
}

/* ════ THEME ════ */
function applyTheme(theme,st){
  currentTheme=theme;currentSt=st;
  document.body.className=`theme-${theme} st-${st}`;
  $toggle.querySelectorAll('.t-opt').forEach(el=>el.classList.toggle('active',el.dataset.theme===theme));
  buildPalette();
  // Portrait color update
  requestAnimationFrame(()=>Portrait.updateColors());
}
$toggle.addEventListener('click',()=>applyTheme(currentTheme==='sun'?'star':'sun',currentSt));
$toggle.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();$toggle.click()}});

let cx=0,cy=0,tx=0,ty=0,trailTimer=0;
const FA_TRAIL_SUN =['fa-sun','fa-star','fa-music','fa-bolt','fa-fire','fa-leaf'];
const FA_TRAIL_STAR=['fa-star','fa-moon','fa-bolt','fa-gem','fa-wind','fa-snowflake'];
document.addEventListener('mousemove',e=>{
  tx=e.clientX;ty=e.clientY;
  $cursorDot.style.left=tx+'px';$cursorDot.style.top=ty+'px';

document.addEventListener('mouseup',()=>$cursor.classList.remove('clicking'));
function spawnTrailIcon(x,y){
  const list=currentTheme==='sun'?FA_TRAIL_SUN:FA_TRAIL_STAR;
  const ico=list[Math.floor(Math.random()*list.length)];
  const el=document.createElement('div');el.className='trail-icon';
  el.innerHTML=`<i class="fa-solid ${ico}"></i>`;
  el.style.left=x+'px';el.style.top=y+'px';
  el.style.color=currentTheme==='sun'?`hsl(${30+Math.random()*30},90%,50%)`:`hsl(${170+Math.random()*40},90%,65%)`;
  document.body.appendChild(el);setTimeout(()=>el.remove(),750);
}

function getEqCount(){const w=window.innerWidth;return w>=1024?56:w>=600?36:20}
function buildEqBars(){$eqWrap.innerHTML='';const n=getEqCount();for(let i=0;i<n;i++){const b=document.createElement('div');b.className='eq-bar';$eqWrap.appendChild(b)}}
buildEqBars();
const resizeObs=new ResizeObserver(buildEqBars);resizeObs.observe(document.body);
const getEqBars=()=>document.querySelectorAll('.eq-bar');
let eqAnim=null;
function animateEq(){getEqBars().forEach((b,i)=>{const wave=Math.sin(Date.now()/300+i*.4)*.3+.7;b.style.height=(4+Math.random()*46*wave)+'px'});eqAnim=requestAnimationFrame(animateEq)}
function stopEq(){if(eqAnim){cancelAnimationFrame(eqAnim);eqAnim=null}getEqBars().forEach(b=>b.style.height='4px')}

/* ════ SUNFLOWER PETALS ════ */
(function(){
  const canvas=document.getElementById('petals-canvas');
  const ctx=canvas.getContext('2d');
  let W,H,petals=[];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
  function drawPetal(x,y,sz,ang,col,a){ctx.save();ctx.globalAlpha=a;ctx.translate(x,y);ctx.rotate(ang);ctx.beginPath();ctx.ellipse(0,-sz*.5,sz*.22,sz*.5,0,0,Math.PI*2);ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=4;ctx.fill();ctx.restore()}
  function drawSunflower(x,y,r,ang,a){ctx.save();ctx.globalAlpha=a;ctx.translate(x,y);ctx.rotate(ang);const pc=['#f5c800','#ff9500','#ffdf00','#ff6f00'];for(let i=0;i<12;i++){ctx.save();ctx.rotate((i/12)*Math.PI*2);ctx.beginPath();ctx.ellipse(0,-(r*.85),r*.22,r*.52,0,0,Math.PI*2);ctx.fillStyle=pc[i%4];ctx.fill();ctx.restore()}ctx.beginPath();ctx.arc(0,0,r*.35,0,Math.PI*2);ctx.fillStyle='#3e2000';ctx.fill();ctx.restore()}
  function mk(){const sf=Math.random()<.15;return{x:Math.random()*W,y:Math.random()*-200,sz:sf?(14+Math.random()*18):(8+Math.random()*14),vx:(Math.random()-.5)*.6,vy:.5+Math.random()*.9,ang:Math.random()*Math.PI*2,va:(Math.random()-.5)*.025,alpha:.4+Math.random()*.45,col:['#f5c800','#ff9500','#ffdf00','#ff6f00','#ffe082'][Math.floor(Math.random()*5)],sf,sw:Math.random()*.4,so:Math.random()*Math.PI*2,t:0}}
  function init(){resize();petals=Array.from({length:44},mk)}
  function draw(){ctx.clearRect(0,0,W,H);petals.forEach((p,i)=>{p.t+=.02;p.x+=p.vx+Math.sin(p.t+p.so)*p.sw;p.y+=p.vy;p.ang+=p.va;if(p.sf)drawSunflower(p.x,p.y,p.sz,p.ang,p.alpha);else drawPetal(p.x,p.y,p.sz,p.ang,p.col,p.alpha);if(p.y>H+40)petals[i]=mk()});requestAnimationFrame(draw)}
  window.addEventListener('resize',resize);init();draw();
})();

/* ════ STARFIELD ════ */
(function(){
  const canvas=document.getElementById('star-canvas');
  const ctx=canvas.getContext('2d');
  let W,H,stars=[];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
  function mk(){return{x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.4+.2,vx:(Math.random()-.5)*.07,vy:(Math.random()-.5)*.07,a:Math.random()*.7+.2,tw:Math.random()*.02}}
  function init(){resize();stars=Array.from({length:260},mk)}
  function draw(){ctx.clearRect(0,0,W,H);for(const s of stars){s.x+=s.vx;s.y+=s.vy;s.a+=s.tw;if(s.a>.9||s.a<.1)s.tw*=-1;if(s.x<0)s.x=W;if(s.x>W)s.x=0;if(s.y<0)s.y=H;if(s.y>H)s.y=0;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(180,240,255,${s.a})`;ctx.fill()}requestAnimationFrame(draw)}
  window.addEventListener('resize',resize);init();draw();
})();

/* ════ BINARY RAIN ════ */
(function(){
  const canvas=document.getElementById('bin-canvas');
  const ctx=canvas.getContext('2d');
  let W,H,cols,drops=[];
  const FS=13;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;cols=Math.floor(W/FS);drops=Array.from({length:cols},()=>Math.random()*H/FS|0)}

function buildPhraseHtml(text){
  if(!text)return'';
  return[...text].map((ch,i)=>`<span class="char-unit" data-idx="${i}">${ch===' '?'&nbsp;':ch}</span>`).join('');
}
function buildCharMap(phrase){
  const ft=phrase.text||'',tm=new Array([...ft].length).fill(null);
  let cp=0,w=phrase.firstWord;
  while(w){
    const wc=[...(w.text||'')],fc=[...ft];let ws=-1;
    for(let i=cp;i<=fc.length-wc.length;i++){let ok=true;for(let k=0;k<wc.length;k++){if(fc[i+k]!==wc[k]){ok=false;break}}if(ok){ws=i;break}}
    if(ws>=0){cp=ws;let c=w.firstChar,co=0;while(c){const cl=[...(c.text||'')].length;for(let k=0;k<cl;k++){if(cp+co+k<tm.length)tm[cp+co+k]={startTime:c.startTime,endTime:c.endTime,wordStart:ws,wordEnd:ws+wc.length-1}}co+=cl;c=c.next}cp+=wc.length}
    w=w.next;
  }
  return tm;
}

function updatePhraseOverlay(idx){
  if(idx===currentPhraseIdx) return;
  // Before switching: place any remaining chars of old phrase into portrait
  if(currentPhraseIdx>=0 && phrases[currentPhraseIdx]){
    // Compute how many chars were already placed by highlightOverlay
    const startSlot = phraseCharSlotStart[currentPhraseIdx] ?? Portrait.slotIdx;
    const alreadyPlacedSlots = Portrait.slotIdx - startSlot;
    const alreadyPlacedChars = Math.floor(alreadyPlacedSlots / (Portrait.slotsPerChar || 1));
    Portrait.placeAll(phrases[currentPhraseIdx].text, alreadyPlacedChars);
  }
  currentPhraseIdx=idx;
  if(!phrases[idx]){ $lyricOverlay.innerHTML=''; return; }
  const text = phrases[idx].text || '';
  $lyricOverlay.innerHTML = buildPhraseHtml(text);
  currentPhraseStart = phrases[idx].startTime;
  currentPhraseEnd   = phrases[idx].endTime;
  $phraseWrap.classList.add('visible');

  // Record slot start for this phrase
  phraseCharSlotStart[idx] = Portrait.slotIdx;

  // Zoom camera to follow lyric placement
  Portrait.setActiveRange(Portrait.slotIdx, Math.min(Portrait.slotIdx + 50, Portrait.totalSlots));
  Portrait.zoomInToActive();

  // Schedule cinematic zoom-out only for the final phrase
  if(idx === phrases.length - 1){
    Portrait.scheduleZoomOut(currentPhraseEnd, currentPhraseStart);
  }

  if(burstMode) spawnIcons(window.innerWidth/2, window.innerHeight*.38, 5);
}

function highlightOverlay(pos, pi){
  const tm = charMaps[pi]; if(!tm) return;
  const units = document.querySelectorAll('#lyric-current-overlay .char-unit');

  // For portrait: place chars as they are sung
  // Count how many chars have been "sung" so far in this phrase
  let sungCount = 0;
  units.forEach((el,i)=>{
    const t=tm[i]; if(!t){ el.classList.remove('active','passed'); return; }
    if(pos>=t.startTime && pos<t.endTime){ el.classList.add('active'); el.classList.remove('passed'); }
    else if(pos>=t.endTime){ el.classList.remove('active'); el.classList.add('passed'); sungCount++; }
    else{ el.classList.remove('active','passed'); }
  });

  // Place chars into portrait up to sungCount
  const base = phraseCharSlotStart[pi] ?? Portrait.slotIdx;
  const alreadyPlacedSlots = Portrait.slotIdx - base;
  const alreadyPlacedChars = Math.floor(alreadyPlacedSlots / (Portrait.slotsPerChar || 1));
  const charsToPlace = sungCount - alreadyPlacedChars;
  if(charsToPlace > 0 && phrases[pi]){
    const phraseText = phrases[pi].text || '';
    // Get the chars that correspond to passed positions
    const passedChars = [...phraseText].filter((c,i)=>{
      const t=tm[i]; return t && pos>=t.endTime;
    }).join('');
    // Place only newly sung chars (skip already-placed ones)
    const newChars = [...passedChars].slice(alreadyPlacedChars).join('');
    if(newChars.trim()) Portrait.placeChars(newChars, newChars.length);
  }

  // Update phrase bar
  if(currentPhraseEnd>currentPhraseStart){
    const pct=Math.min(100,Math.max(0,((pos-currentPhraseStart)/(currentPhraseEnd-currentPhraseStart))*100));
    $phraseBar.style.width=pct+'%';
  }
}

function clearOverlay(){
  $lyricOverlay.innerHTML='';
  $phraseWrap.classList.remove('visible');
  $phraseBar.style.width='0%';
}

function initPlayer(){
  const{Player}=TextAliveApp;
  player=new Player({app:{token:"E96Wa5egutbj0ueY"},mediaElement:document.createElement('audio'),mediaBannerPosition:'top left'});
  player.addListener({
    onAppReady(app){
      playerReady=true;
      if(!app.managed&&userSelectedKey) loadSong(userSelectedKey);
      $loading.classList.add('hidden');
    },
    onVideoReady(v){
      phrases=[];charMaps=[];phraseCharSlotStart=[];
      let p=v.firstPhrase;
      while(p){phrases.push(p);charMaps.push(buildCharMap(p));p=p.next}
      currentPhraseIdx=-1;
      $lyricOverlay.innerHTML='<i class="fa-solid fa-music"></i>';

      // Count total non-whitespace chars across all phrases
      let totalChars = 0;
      phrases.forEach(ph=>{
        totalChars += [...(ph.text||'')].filter(c=>c.trim()).length;
      });
      // 10000 slots for maximum portrait accuracy
      // Each lyric char appears once at boosted font; remaining slots = colored dots
      const targetSlots = 10000;
      console.log(`Total lyric chars: ${totalChars} → building ${targetSlots} slots (no-repeat lyrics)`);

      // Rebuild portrait slots with base 5-9px fonts (lyrics get boosted automatically)
      Portrait.buildSlots(targetSlots, totalChars);
    },
    onTimerReady(){duration=player.video?.duration||0},
    onTimeUpdate(pos){
      if(!player.video)return;
      duration=player.video.duration||duration;
      if(duration>0){const pct=(pos/duration)*100;$progressBar.style.width=pct+'%';$progressTh.style.setProperty('--pct',pct+'%')}
      let found=-1;
      for(let i=0;i<phrases.length;i++){if(pos>=phrases[i].startTime&&pos<phrases[i].endTime){found=i;break}}
      if(found>=0){updatePhraseOverlay(found);highlightOverlay(pos,found)}
      else if(currentPhraseIdx>=0){
        // between phrases — check if we just left one
        const prevPhrase = phrases[currentPhraseIdx];
        if(prevPhrase && pos >= prevPhrase.endTime){
          clearOverlay();
          // ensure remaining chars are placed — compute skip to avoid double-counting
          const startSlot = phraseCharSlotStart[currentPhraseIdx] ?? Portrait.slotIdx;
          const alreadyPlacedSlots = Portrait.slotIdx - startSlot;
          const alreadyPlacedChars = Math.floor(alreadyPlacedSlots / (Portrait.slotsPerChar || 1));
          Portrait.placeAll(prevPhrase.text, alreadyPlacedChars);

          // After the LAST phrase ends, fill any remaining slots to guarantee 100%
          if(currentPhraseIdx === phrases.length - 1 && Portrait.slotIdx < Portrait.totalSlots){
            Portrait.fillRemaining();
          }

          currentPhraseIdx=-1;
        }
      }
    },
    onBeat(b){
      $beatPulse.classList.add('on');setTimeout(()=>$beatPulse.classList.remove('on'),100);
      $beat.classList.add('on');spawnRipple();setTimeout(()=>$beat.classList.remove('on'),130);
    },
    onChord(chord){if(chord?.name){$chord.textContent=chord.name;$chord.classList.add('visible');clearTimeout($chord._t);$chord._t=setTimeout(()=>$chord.classList.remove('visible'),1400)}},
    onPlay(){animateEq()},
    onPause(){stopEq()},
    onStop(){
      stopEq();
      $progressBar.style.width='0%';
      $progressTh.style.setProperty('--pct','0%');
      $lyricOverlay.innerHTML='<i class="fa-solid fa-music"></i>';
      clearOverlay();
      Portrait.resetSlots();
      currentPhraseIdx=-1;
    },
    onDispose(){
      Portrait.resetSlots();
    }
  });
}

function loadSong(key){
  const song=SONGS[key];if(!song||!player)return;
  if(isCreating){pendingAfterCreate=key;applyTheme(currentTheme,song.st);$songTitle.textContent=song.name;return;}
  pendingAfterCreate=null;
  applyTheme(currentTheme,song.st);
  $songTitle.textContent=song.name;
  $loading.classList.remove('hidden');
  isCreating=true;
  Portrait.resetSlots();
  const finish=()=>{isCreating=false;$loading.classList.add('hidden');if(pendingAfterCreate){const nk=pendingAfterCreate;pendingAfterCreate=null;loadSong(nk)}};
  player.createFromSongUrl(song.url,{video:song.video}).then(finish).catch(err=>{console.error(err);finish()});
}
