<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Magical Mirai 2026 · Lyric App · Rico Eriansyah</title>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<script src="https://unpkg.com/textalive-app-api/dist/index.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Kurenaido&family=Noto+Serif+JP:wght@300;400;700&display=swap');

/* ════════════════════════════════════════
   THEME VARIABLES
   body.theme-sun   = Summer / Sunflower (default)
   body.theme-cyber = Cyber / Miku
════════════════════════════════════════ */
body.theme-sun {
  --bg:#0d0800;
  --surface:#1a1000;
  --c1:#f5c800;
  --c2:#ffdf00;
  --c3:#fff176;
  --accent:#ff9500;
  --text:#fff8e1;
  --muted:#6d5c3a;
  --ctrl-bg:rgba(13,8,0,0.78);
  --ctrl-border:rgba(245,200,0,0.25);
  --select-bg:rgba(26,16,0,0.85);
  --banner-bg:rgba(13,8,0,0.65);
  --banner-border:rgba(245,200,0,0.2);
}
body.theme-cyber {
  --bg:#03020a;
  --surface:#0d0b1e;
  --c1:#39c5bb;
  --c2:#0ff0e4;
  --c3:#00fff7;
  --accent:#00e5ff;
  --text:#e8e0ff;
  --muted:#5a526e;
  --ctrl-bg:rgba(3,2,10,0.75);
  --ctrl-border:rgba(57,197,187,0.2);
  --select-bg:rgba(13,11,30,0.85);
  --banner-bg:rgba(3,2,10,0.6);
  --banner-border:rgba(57,197,187,0.15);
}

/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
body{
  font-family:'Zen Kurenaido','Noto Serif JP',serif;
  background:var(--bg);
  color:var(--text);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  position:relative;
  transition:background 0.7s,color 0.5s;
}

/* ════ BACKGROUND LAYERS ════ */
#bg-layer{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  transition:opacity 0.7s;
}
body.theme-sun  #bg-layer{background:radial-gradient(ellipse 80% 60% at 50% -10%, #ff9500 0%, #c65c00 25%, #3d1a00 60%, #0d0800 100%);}
body.theme-cyber #bg-layer{background:radial-gradient(ellipse 60% 50% at 50% -5%, #0d2a4a 0%, #060418 55%, #03020a 100%);}

/* ── Sun elements ── */
#sun-orb,#sun-rays{
  position:fixed;top:-80px;left:50%;
  transform:translateX(-50%);
  width:260px;height:260px;
  pointer-events:none;z-index:1;
  transition:opacity 0.7s;
}
#sun-orb{
  border-radius:50%;
  background:radial-gradient(circle,#fff7cc 0%,#ffe033 35%,#ff9500 65%,transparent 100%);
  box-shadow:0 0 60px 20px #ff950088,0 0 120px 40px #f5c80044;
  animation:sun-breathe 4s ease-in-out infinite;
}
@keyframes sun-breathe{0%,100%{transform:translateX(-50%) scale(1);}50%{transform:translateX(-50%) scale(1.04);}}
#sun-rays{animation:rays-spin 18s linear infinite;}
#sun-rays::before{
  content:'';position:absolute;top:50%;left:50%;
  width:600px;height:600px;transform:translate(-50%,-50%);
  background:repeating-conic-gradient(from 0deg,rgba(245,200,0,0.07) 0deg 12deg,transparent 12deg 24deg);
  border-radius:50%;
}
@keyframes rays-spin{to{transform:translateX(-50%) rotate(360deg);}}
body.theme-cyber #sun-orb,body.theme-cyber #sun-rays{opacity:0;}
body.theme-sun  #sun-orb,body.theme-sun  #sun-rays{opacity:1;}

/* ── Canvases ── */
#petals-canvas{position:fixed;inset:0;z-index:1;pointer-events:none;transition:opacity 0.7s;}
#star-canvas  {position:fixed;inset:0;z-index:1;pointer-events:none;transition:opacity 0.7s;}
#bin-canvas   {position:fixed;inset:0;z-index:1;pointer-events:none;transition:opacity 0.7s;}
body.theme-sun  #petals-canvas{opacity:0.75;} body.theme-sun  #star-canvas{opacity:0;}   body.theme-sun  #bin-canvas{opacity:0.04;}
body.theme-cyber #petals-canvas{opacity:0;}  body.theme-cyber #star-canvas{opacity:1;}  body.theme-cyber #bin-canvas{opacity:0.08;}

/* ── EQ bars ── */
#eq-wrap{position:fixed;bottom:0;left:0;right:0;height:44px;display:flex;align-items:flex-end;justify-content:center;gap:2px;z-index:2;pointer-events:none;}
.eq-bar{width:3px;border-radius:2px 2px 0 0;background:linear-gradient(to top,var(--accent),var(--c2));height:3px;transition:height 0.1s;opacity:0.5;}

/* ── Stage ── */
#stage{position:relative;z-index:3;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}

/* ── Lyric wrap ── */
#lyric-wrap{
  position:absolute;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;gap:0.9rem;padding:5rem 1.2rem 7rem;
}

/* ── Lyric lines ── */
.lyric-line{font-size:clamp(1.5rem,7vw,2.4rem);font-weight:700;letter-spacing:0.1em;text-align:center;width:100%;padding:0 0.5rem;transition:opacity 0.3s,transform 0.3s;line-height:1.5;word-break:break-word;overflow-wrap:break-word;}
.lyric-line.current{color:var(--text);text-shadow:0 0 18px var(--c2),0 0 45px var(--accent),0 0 3px #fff;animation:pulse-lyric 0.45s ease;}
.lyric-line.prev{color:var(--muted);opacity:0.35;font-size:clamp(0.85rem,4vw,1.3rem);transform:translateY(-0.25em) scale(0.84);}
.lyric-line.next{color:var(--muted);opacity:0.35;font-size:clamp(0.85rem,4vw,1.3rem);transform:translateY(0.25em) scale(0.84);}
@keyframes pulse-lyric{0%{transform:scale(0.88);opacity:0}60%{transform:scale(1.06);opacity:1}100%{transform:scale(1)}}

/* ── Char units ── */
.char-unit{display:inline-block;transition:color 0.06s,transform 0.12s,text-shadow 0.12s;}
.char-unit.active{color:var(--c3);text-shadow:0 0 10px var(--c3),0 0 24px var(--accent),0 0 40px var(--c1);transform:translateY(-5px) scale(1.15);}
body.theme-sun   .char-unit.passed{color:#e6a820;opacity:0.75;}
body.theme-cyber .char-unit.passed{color:#5ee7df;opacity:0.7;}

/* ── Beat indicator ── */
#beat-indicator{position:fixed;top:1rem;right:1rem;width:14px;height:14px;border-radius:50%;background:var(--c2);box-shadow:0 0 14px var(--c2),0 0 30px var(--accent);opacity:0;z-index:10;transition:opacity 0.05s;}
#beat-indicator.on{opacity:1}

/* ── Chord badge ── */
#chord-badge{position:fixed;bottom:5.5rem;left:50%;transform:translateX(-50%);font-size:0.72rem;letter-spacing:0.2em;color:var(--c2);opacity:0;transition:opacity 0.2s;z-index:10;text-shadow:0 0 10px var(--accent);white-space:nowrap;}
#chord-badge.visible{opacity:0.8}

/* ══════════════════════════════════════
   THEME TOGGLE PILL
══════════════════════════════════════ */
#theme-toggle{
  position:relative;display:flex;align-items:center;
  background:rgba(0,0,0,0.3);
  border:1.5px solid var(--c1);
  border-radius:30px;padding:3px;
  cursor:pointer;z-index:25;
  transition:border-color 0.5s;
  min-width:110px;min-height:40px;flex-shrink:0;
  user-select:none;
}
#theme-toggle .t-opt{
  flex:1;text-align:center;font-family:inherit;
  font-size:0.6rem;letter-spacing:0.07em;
  padding:0.28rem 0.4rem;border-radius:26px;
  color:var(--muted);
  transition:color 0.3s,background 0.3s,box-shadow 0.3s;
  white-space:nowrap;line-height:1.3;
}
#theme-toggle .t-opt.active{
  color:var(--bg);background:var(--c1);
  box-shadow:0 0 14px var(--c1);font-weight:700;
}

/* ── Controls ── */
#controls{
  position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:0.5rem;
  z-index:20;width:calc(100% - 2rem);max-width:440px;
  background:var(--ctrl-bg);border:1px solid var(--ctrl-border);
  padding:0.65rem 0.9rem;border-radius:20px;
  backdrop-filter:blur(12px);
  transition:background 0.5s,border-color 0.5s;
}
#row-top{display:flex;gap:0.5rem;width:100%;align-items:center;}
#btn-row{display:flex;gap:0.5rem;justify-content:center;width:100%;}
.btn{
  background:transparent;border:1.5px solid var(--c1);color:var(--c1);
  font-family:inherit;font-size:0.68rem;letter-spacing:0.12em;
  padding:0.45rem 0.9rem;cursor:pointer;border-radius:16px;
  transition:background 0.2s,color 0.2s,box-shadow 0.2s,border-color 0.5s;
  flex:1;min-height:40px;
}
.btn:hover,.btn:focus{background:var(--c1);color:var(--bg);box-shadow:0 0 18px var(--c1);outline:none;}
.btn:active{background:var(--c1);color:var(--bg);transform:scale(0.96);}
#song-select{
  width: 50%;
  background:var(--select-bg);border:1px solid var(--ctrl-border);
  color:var(--text);font-family:inherit;padding:0.45rem 0.7rem;
  border-radius:16px;cursor:pointer;flex:1;min-height:40px;font-size:16px;
  transition:background 0.5s,border-color 0.5s;
}

/* ── Progress bar ── */
#progress-bar{position:fixed;bottom:0;left:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--c1),var(--c3));width:0%;z-index:30;transition:width 0.25s linear;box-shadow:0 0 10px var(--c2);}

/* ── Info banner ── */
#info-banner{
  position:fixed;top:0.8rem;left:50%;transform:translateX(-50%);
  text-align:center;z-index:10;
  background:var(--banner-bg);border:1px solid var(--banner-border);
  padding:0.3rem 1rem;border-radius:16px;backdrop-filter:blur(8px);
  max-width:calc(100% - 4rem);
  transition:background 0.5s,border-color 0.5s;
}
#info-banner .label-top{font-size:0.55rem;letter-spacing:0.24em;color:var(--c1);text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color 0.5s;}
#info-banner .song-name{font-size:0.85rem;color:var(--text);letter-spacing:0.08em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60vw;}

/* ── Loading ── */
#loading{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;background:var(--bg);transition:opacity 0.6s;}
#loading.hidden{opacity:0;pointer-events:none}
.loader-ring{width:50px;height:50px;border:2.5px solid var(--surface);border-top-color:var(--c2);border-right-color:var(--accent);border-radius:50%;animation:spin 0.75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-size:0.72rem;color:var(--muted);letter-spacing:0.2em}

/* ── Ripple ── */
.ripple{position:fixed;border-radius:50%;border:1.5px solid var(--c1);pointer-events:none;z-index:5;animation:ripple-out 0.9s ease forwards;}
@keyframes ripple-out{from{width:6px;height:6px;opacity:0.85;transform:translate(-50%,-50%) scale(1)}to{width:160px;height:160px;opacity:0;transform:translate(-50%,-50%) scale(1)}}

#theme-toggle .t-opt i{font-size:0.75rem;pointer-events:none;}
.btn i{font-size:0.8rem;}
body.theme-sun.st-0{--c1:#f5c800;--c2:#ffdf00;--c3:#fff176;--accent:#ff9500}
body.theme-sun.st-1{--c1:#e0aa00;--c2:#ffd54f;--c3:#fff8e1;--accent:#e65100}
body.theme-sun.st-2{--c1:#ffab40;--c2:#ffca28;--c3:#fff9c4;--accent:#ff6d00}
body.theme-sun.st-3{--c1:#ff8f00;--c2:#ffca28;--c3:#fff176;--accent:#e65100}
body.theme-sun.st-4{--c1:#fdd835;--c2:#fff176;--c3:#fffde7;--accent:#f57f17}
body.theme-sun.st-5{--c1:#ff6f00;--c2:#ffa000;--c3:#ffca28;--accent:#bf360c}
body.theme-cyber.st-0{--c1:#39c5bb;--c2:#0ff0e4;--c3:#00fff7;--accent:#00e5ff}
body.theme-cyber.st-1{--c1:#7c5cbf;--c2:#b08fff;--c3:#d4b4ff;--accent:#a855f7}
body.theme-cyber.st-2{--c1:#e85d8a;--c2:#ff8cb0;--c3:#ffc2d8;--accent:#f43f8e}
body.theme-cyber.st-3{--c1:#f0a500;--c2:#ffc84a;--c3:#ffe399;--accent:#f59e0b}
body.theme-cyber.st-4{--c1:#3da8e0;--c2:#7ecfff;--c3:#b5e8ff;--accent:#0ea5e9}
body.theme-cyber.st-5{--c1:#e05050;--c2:#ff8080;--c3:#ffb8b8;--accent:#ef4444}

/* ════ TABLET ≥ 600px ════ */
@media(min-width:600px){
  #eq-wrap{height:52px;gap:3px} .eq-bar{width:4px}
  #lyric-wrap{padding:5.5rem 2.5rem 7.5rem;gap:1.1rem;}
  .lyric-line{font-size:clamp(1.8rem,4.5vw,3rem);letter-spacing:0.12em;}
  .lyric-line.prev,.lyric-line.next{font-size:clamp(1rem,2.5vw,1.7rem);}
  #beat-indicator{top:1.5rem;right:1.8rem;}
  #chord-badge{bottom:5.8rem;font-size:0.78rem;}
  #controls{flex-direction:row;flex-wrap:wrap;justify-content:center;width:auto;max-width:620px;padding:0.65rem 1rem;border-radius:30px;bottom:1.2rem;gap:0.6rem;}
  #row-top{width:auto;flex:none;}
  #btn-row{width:auto;flex:none;}
  .btn{flex:none;font-size:0.72rem;padding:0.48rem 1.1rem;min-height:36px;}
  #song-select{flex:none;width:auto;max-width:210px;font-size:0.72rem;min-height:36px;}
  #theme-toggle{min-height:36px;}
  #info-banner{top:1.2rem;padding:0.35rem 1.2rem;border-radius:18px;}
  #info-banner .label-top{font-size:0.58rem;}
  #info-banner .song-name{font-size:0.95rem;max-width:70vw;}
}

/* ════ DESKTOP ≥ 1024px ════ */
@media(min-width:1024px){
  #eq-wrap{height:60px;gap:3px} .eq-bar{width:4px;opacity:0.55}
  #lyric-wrap{padding:6rem 4rem 8rem;gap:1.4rem;}
  .lyric-line{font-size:clamp(2rem,4vw,3.8rem);letter-spacing:0.14em;padding:0 2.5rem;}
  .lyric-line.prev,.lyric-line.next{font-size:clamp(1rem,2vw,1.9rem);}
  #beat-indicator{top:2rem;right:2.5rem;width:16px;height:16px;}
  #chord-badge{bottom:6rem;font-size:0.82rem;letter-spacing:0.22em;}
  #controls{flex-direction:row;flex-wrap:nowrap;width:auto;max-width:none;padding:0.7rem 1.4rem;border-radius:40px;bottom:1.6rem;gap:0.9rem;}
  #row-top{flex:none;}
  .btn{font-size:0.72rem;padding:0.48rem 1.2rem;min-height:unset;}
  #song-select{font-size:0.72rem;max-width:240px;min-height:unset;}
  #theme-toggle{min-height:unset;}
  #info-banner{top:1.4rem;padding:0.4rem 1.4rem;border-radius:20px;}
  #info-banner .label-top{font-size:0.6rem;letter-spacing:0.28em;}
  #info-banner .song-name{font-size:1rem;max-width:none;}
  .char-unit.active{transform:translateY(-5px) scale(1.15);}
}
</style>
</head>
<body class="theme-sun st-0">

  <div class="loader-ring"></div>
  <p>LOADING TEXTALIVE…</p>
</div>

<div id="info-banner">
  <div class="label-top">Magical Mirai 2026 · Lyric App · Rico Eriansyah</div>

</div>

<div id="eq-wrap"></div>
<div id="beat-indicator"></div>
<div id="chord-badge"></div>

<div id="stage">
  <div id="lyric-wrap">
    <div class="lyric-line prev"    id="lyric-prev"></div>
    <div class="lyric-line current" id="lyric-current"><i class="fa-solid fa-music"></i></div>
    <div class="lyric-line next"    id="lyric-next"></div>
  </div>
</div>

<div id="controls">
  <div id="row-top">

  </div>
</div>

<div id="progress-bar"></div>

<script>
/* ── Song data ── */
const SONGS = {
  "6W2N":{name:"こたえて / imie",          url:"https://piapro.jp/t/6W2N/20251215164617",st:0,video:{beatId:4827293,chordId:2963754,repetitiveSegmentId:3086261,lyricId:126519,lyricDiffId:28645}},
  "zoqO":{name:"アフター・ザ・カーテン / Rulmry",url:"https://piapro.jp/t/zoqO/20251214200738",st:1,video:{beatId:4827294,chordId:2963755,repetitiveSegmentId:3086262,lyricId:126591,lyricDiffId:28627}},
  "PNpQ":{name:"シャッターチャンス / 夜未アガリ",  url:"https://piapro.jp/t/PNpQ/20251209170719",st:2,video:{beatId:4827295,chordId:2963756,repetitiveSegmentId:3086263,lyricId:126542,lyricDiffId:28628}},
  "B3yJ":{name:"世界最後の音楽隊 / 夏山よつぎ×ど～ぱみん",url:"https://piapro.jp/t/B3yJ/20251215061727",st:3,video:{beatId:4827296,chordId:2963757,repetitiveSegmentId:3086264,lyricId:126594,lyricDiffId:28629}},
  "QBdL":{name:"トリツクロジー / 鶴三",       url:"https://piapro.jp/t/QBdL/20251215094303",st:4,video:{beatId:4827297,chordId:2963758,repetitiveSegmentId:3086265,lyricId:126593,lyricDiffId:28630}},
  "E2i3":{name:"TAKEOVER / Twinfield",      url:"https://piapro.jp/t/E2i3/20251215092113",st:5,video:{beatId:4827298,chordId:2963759,repetitiveSegmentId:3086266,lyricId:126533,lyricDiffId:28631}}
};

/* ── DOM refs ── */
const $loading  = document.getElementById('loading');
const $songTitle= document.getElementById('song-title');
const $prev     = document.getElementById('lyric-prev');
const $current  = document.getElementById('lyric-current');
const $next     = document.getElementById('lyric-next');
const $beat     = document.getElementById('beat-indicator');
const $chord    = document.getElementById('chord-badge');
const $progress = document.getElementById('progress-bar');
const $songSel  = document.getElementById('song-select');
const $eqWrap   = document.getElementById('eq-wrap');
const $toggle   = document.getElementById('theme-toggle');

let currentTheme = 'sun';
let currentSt    = 0;

/* ════ THEME SWITCHER ════ */
function applyTheme(theme, st){
  currentTheme = theme;
  currentSt    = st;
  document.body.className = `theme-${theme} st-${st}`;
  $toggle.querySelectorAll('.t-opt').forEach(el=>{
    el.classList.toggle('active', el.dataset.theme === theme);
  });
}

$toggle.addEventListener('click', ()=>{
  applyTheme(currentTheme === 'sun' ? 'cyber' : 'sun', currentSt);
});
$toggle.addEventListener('keydown', e=>{
  if(e.key==='Enter'||e.key===' '){e.preventDefault();$toggle.click();}
});

/* ════ EQ BARS ════ */
function getEqCount(){const w=window.innerWidth;return w>=1024?48:w>=600?32:20;}
function buildEqBars(){$eqWrap.innerHTML='';const n=getEqCount();for(let i=0;i<n;i++){const b=document.createElement('div');b.className='eq-bar';$eqWrap.appendChild(b);}}
buildEqBars();
window.addEventListener('resize',buildEqBars);
const eqBars=()=>document.querySelectorAll('.eq-bar');
let eqAnim=null;
function animateEq(){eqBars().forEach(b=>{b.style.height=(4+Math.random()*46)+'px';});eqAnim=requestAnimationFrame(animateEq);}
function stopEq(){if(eqAnim){cancelAnimationFrame(eqAnim);eqAnim=null;}eqBars().forEach(b=>b.style.height='4px');}

/* ════ SUNFLOWER PETALS CANVAS ════ */
(function(){
  const canvas=document.getElementById('petals-canvas');
  const ctx=canvas.getContext('2d');
  let W,H,petals=[];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}

  function drawPetal(x,y,sz,ang,col,a){
    ctx.save();ctx.globalAlpha=a;ctx.translate(x,y);ctx.rotate(ang);
    ctx.beginPath();ctx.ellipse(0,-sz*0.5,sz*0.22,sz*0.5,0,0,Math.PI*2);
    ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=5;ctx.fill();ctx.restore();
  }
  function drawSunflower(x,y,r,ang,a){
    ctx.save();ctx.globalAlpha=a;ctx.translate(x,y);ctx.rotate(ang);
    const pc=['#f5c800','#ff9500','#ffdf00','#ff6f00'];
    for(let i=0;i<12;i++){
      ctx.save();ctx.rotate((i/12)*Math.PI*2);
      ctx.beginPath();ctx.ellipse(0,-(r*0.85),r*0.22,r*0.52,0,0,Math.PI*2);
      ctx.fillStyle=pc[i%4];ctx.fill();ctx.restore();
    }
    ctx.beginPath();ctx.arc(0,0,r*0.35,0,Math.PI*2);ctx.fillStyle='#3e2000';ctx.fill();
    ctx.beginPath();ctx.arc(0,0,r*0.20,0,Math.PI*2);ctx.fillStyle='#5c3000';ctx.fill();
    ctx.restore();
  }
  function mk(){
    const sf=Math.random()<0.15;
    return{x:Math.random()*W,y:Math.random()*-200,sz:sf?(14+Math.random()*18):(8+Math.random()*14),
      vx:(Math.random()-0.5)*0.6,vy:0.5+Math.random()*0.9,
      ang:Math.random()*Math.PI*2,va:(Math.random()-0.5)*0.025,
      alpha:0.5+Math.random()*0.5,
      col:['#f5c800','#ff9500','#ffdf00','#ff6f00','#ffe082'][Math.floor(Math.random()*5)],
      sf,sw:Math.random()*0.4,so:Math.random()*Math.PI*2,t:0};
  }
  function init(){resize();petals=Array.from({length:42},mk);}
  function draw(){
    ctx.clearRect(0,0,W,H);
    petals.forEach((p,i)=>{
      p.t+=0.02;p.x+=p.vx+Math.sin(p.t+p.so)*p.sw;p.y+=p.vy;p.ang+=p.va;
      if(p.sf)drawSunflower(p.x,p.y,p.sz,p.ang,p.alpha);
      else drawPetal(p.x,p.y,p.sz,p.ang,p.col,p.alpha);
      if(p.y>H+40)petals[i]=mk();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);
  init();draw();
})();

/* ════ STARFIELD CANVAS ════ */
(function(){
  const canvas=document.getElementById('star-canvas');
  const ctx=canvas.getContext('2d');
  let W,H,stars=[];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  function mk(){return{x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.3+0.2,vx:(Math.random()-0.5)*0.07,vy:(Math.random()-0.5)*0.07,a:Math.random()*0.7+0.2,tw:Math.random()*0.02};}
  function init(){resize();stars=Array.from({length:220},mk);}
  function draw(){
    ctx.clearRect(0,0,W,H);
    for(const s of stars){
      s.x+=s.vx;s.y+=s.vy;s.a+=s.tw;
      if(s.a>0.9||s.a<0.1)s.tw*=-1;
      if(s.x<0)s.x=W;if(s.x>W)s.x=0;if(s.y<0)s.y=H;if(s.y>H)s.y=0;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(180,240,255,${s.a})`;ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);
  init();draw();
})();

/* ════ BINARY RAIN ════ */
(function(){
  const canvas=document.getElementById('bin-canvas');
  const ctx=canvas.getContext('2d');
  let W,H,cols,drops=[];
  const FS=13;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;cols=Math.floor(W/FS);drops=Array.from({length:cols},()=>Math.random()*H/FS|0);}
  function draw(){
    const isSun=document.body.classList.contains('theme-sun');
    ctx.fillStyle=isSun?'rgba(13,8,0,0.04)':'rgba(3,2,10,0.04)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle=isSun?'#f5c800':'#0ff0e4';
    ctx.font=FS+'px monospace';
    for(let i=0;i<drops.length;i++){
      ctx.globalAlpha=Math.random()*0.35+0.05;
      ctx.fillText(Math.random()>0.5?'1':'0',i*FS,drops[i]*FS);
      if(drops[i]*FS>H&&Math.random()>0.975)drops[i]=0;
      drops[i]++;
    }
    ctx.globalAlpha=1;
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);
  resize();draw();
})();

/* ════ RIPPLE ════ */
function spawnRipple(){
  const el=document.createElement('div');
  el.className='ripple';
  el.style.left=(15+Math.random()*70)+'vw';
  el.style.top=(20+Math.random()*60)+'vh';
  el.style.borderColor = currentTheme==='sun'
    ? `hsl(${38+Math.random()*28},100%,55%)`
    : `hsl(${175+Math.random()*20},90%,65%)`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),950);
}

/* ════ LYRIC HELPERS ════ */
function buildPhraseHtml(text){
  if(!text)return'';
  return[...text].map((ch,i)=>`<span class="char-unit" data-idx="${i}">${ch===' '?'&nbsp;':ch}</span>`).join('');
}
function buildCharMap(phrase){
  const ft=phrase.text||'',tm=new Array([...ft].length).fill(null);
  let cp=0,w=phrase.firstWord;
  while(w){
    const wc=[...(w.text||'')],fc=[...ft];
    let ws=-1;
    for(let i=cp;i<=fc.length-wc.length;i++){
      let ok=true;for(let k=0;k<wc.length;k++){if(fc[i+k]!==wc[k]){ok=false;break;}}
      if(ok){ws=i;break;}
    }
    if(ws>=0){
      cp=ws;let c=w.firstChar,co=0;
      while(c){
        const cl=[...(c.text||'')].length;
        for(let k=0;k<cl;k++){if(cp+co+k<tm.length)tm[cp+co+k]={startTime:c.startTime,endTime:c.endTime};}
        co+=cl;c=c.next;
      }
      cp+=wc.length;
    }
    w=w.next;
  }
  return tm;
}

let player=null,phrases=[],currentPhraseIdx=-1,charMaps=[];

function updatePhrase(idx){
  if(idx===currentPhraseIdx)return;
  currentPhraseIdx=idx;
  $prev.innerHTML   =phrases[idx-1]?.text?buildPhraseHtml(phrases[idx-1].text):'';
  $current.innerHTML=phrases[idx]?.text  ?buildPhraseHtml(phrases[idx].text)  :'';
  $next.innerHTML   =phrases[idx+1]?.text?buildPhraseHtml(phrases[idx+1].text):'';
}
function highlightChars(pos,pi){
  const tm=charMaps[pi];if(!tm)return;
  document.querySelectorAll('#lyric-current .char-unit').forEach((el,i)=>{
    const t=tm[i];
    if(!t){el.classList.remove('active','passed');return;}
    if(pos>=t.startTime&&pos<t.endTime){el.classList.add('active');el.classList.remove('passed');}
    else if(pos>=t.endTime){el.classList.remove('active');el.classList.add('passed');}
    else{el.classList.remove('active','passed');}
  });
}
function clearHighlight(){document.querySelectorAll('#lyric-current .char-unit').forEach(el=>el.classList.remove('active','passed'));}

/* ════ PLAYER ════ */
function initPlayer(){
  const {Player}=TextAliveApp;
  player=new Player({
    app:{token:"E96Wa5egutbj0ueY"},
    mediaElement:document.createElement('audio'),
    mediaBannerPosition:'top left'
  });
  player.addListener({
    onAppReady(app){if(!app.managed)loadSong($songSel.value);$loading.classList.add('hidden');},
    onVideoReady(v){
      phrases=[];charMaps=[];
      let p=v.firstPhrase;while(p){phrases.push(p);charMaps.push(buildCharMap(p));p=p.next;}
      currentPhraseIdx=-1;$current.innerHTML='<i class="fa-solid fa-music"></i>';$prev.innerHTML='';$next.innerHTML='';
    },
    onTimerReady(){$songTitle.textContent=SONGS[$songSel.value]?.name||'—';},
    onTimeUpdate(pos){
      if(!player.video)return;
      const dur=player.video.duration;
      if(dur>0)$progress.style.width=((pos/dur)*100)+'%';
      let found=-1;
      for(let i=0;i<phrases.length;i++){if(pos>=phrases[i].startTime&&pos<phrases[i].endTime){found=i;break;}}
      if(found>=0){updatePhrase(found);highlightChars(pos,found);}
      else clearHighlight();
    },
    onBeat(){$beat.classList.add('on');spawnRipple();setTimeout(()=>$beat.classList.remove('on'),130);},
    onChord(chord){
      if(chord?.name){$chord.textContent=chord.name;$chord.classList.add('visible');clearTimeout($chord._t);$chord._t=setTimeout(()=>$chord.classList.remove('visible'),1300);}
    },
    onPlay(){animateEq()},
    onPause(){stopEq()},
    onStop(){stopEq();$progress.style.width='0%';$current.innerHTML='<i class="fa-solid fa-music"></i>';$prev.innerHTML='';$next.innerHTML='';clearHighlight();}
  });
}

function loadSong(key){
  const song=SONGS[key];if(!song||!player)return;
  applyTheme(currentTheme, song.st);
  $songTitle.textContent=song.name;
  $loading.classList.remove('hidden');
  player.createFromSongUrl(song.url,{video:song.video})
    .then(()=>$loading.classList.add('hidden'))
    .catch(err=>{console.error(err);$loading.classList.add('hidden');});
}

document.getElementById('btn-play') .addEventListener('click',()=>player?.requestPlay());
document.getElementById('btn-pause').addEventListener('click',()=>player?.requestPause());
document.getElementById('btn-stop') .addEventListener('click',()=>player?.requestStop());
$songSel.addEventListener('change',()=>{player?.requestStop();loadSong($songSel.value);});

initPlayer();
</script>
