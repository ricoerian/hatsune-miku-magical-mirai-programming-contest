<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Magical Mirai 2026 · Lyric App · Rico Eriansyah</title>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<script src="https://unpkg.com/textalive-app-api/dist/index.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Kurenaido&family=Noto+Serif+JP:wght@300;400;700&display=swap');

/* ── Variables — Summer / Sunflower ── */
:root{
  --bg:#0d0800;
  --surface:#1a1000;
  --sun1:#f5c800;
  --sun2:#ffdf00;
  --sun3:#ffe94d;
  --petal:#ff9500;
  --leaf:#4caf50;
  --sky:#ffe0b2;
  --accent:#ff6f00;
  --accent3:#fff176;
  --text:#fff8e1;
  --muted:#6d5c3a;
  --glow-sun: 0 0 20px #f5c800, 0 0 50px #ff9500;
}

/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
body{
  font-family:'Zen Kurenaido','Noto Serif JP',serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  position:relative;
}

/* ── Sky gradient background ── */
body::before{
  content:'';
  position:fixed;inset:0;z-index:0;
  background: radial-gradient(ellipse 80% 60% at 50% -10%, #ff9500 0%, #c65c00 25%, #3d1a00 60%, #0d0800 100%);
  pointer-events:none;
}

/* ── Sun glow ── */
#sun-orb{
  position:fixed;
  top:-80px;left:50%;
  transform:translateX(-50%);
  width:260px;height:260px;
  border-radius:50%;
  background:radial-gradient(circle, #fff7cc 0%, #ffe033 35%, #ff9500 65%, transparent 100%);
  box-shadow: 0 0 60px 20px #ff950088, 0 0 120px 40px #f5c80044;
  z-index:1;
  pointer-events:none;
  animation: sun-breathe 4s ease-in-out infinite;
}
@keyframes sun-breathe{
  0%,100%{transform:translateX(-50%) scale(1);}
  50%{transform:translateX(-50%) scale(1.04);}
}

/* ── Sun rays ── */
#sun-rays{
  position:fixed;
  top:-80px;left:50%;
  transform:translateX(-50%);
  width:260px;height:260px;
  z-index:0;
  pointer-events:none;
  animation: rays-spin 18s linear infinite;
}
#sun-rays::before{
  content:'';
  position:absolute;
  top:50%;left:50%;
  width:600px;height:600px;
  transform:translate(-50%,-50%);
  background: repeating-conic-gradient(
    from 0deg,
    rgba(245,200,0,0.07) 0deg 12deg,
    transparent 12deg 24deg
  );
  border-radius:50%;
}
@keyframes rays-spin{to{transform:translateX(-50%) rotate(360deg);}}

/* ── Falling petals ── */
#petals-canvas{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0.7}
#bin-canvas{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0.04}

/* ── EQ bars ── */
#eq-wrap{
  position:fixed;bottom:0;left:0;right:0;
  height:44px;
  display:flex;align-items:flex-end;justify-content:center;gap:2px;
  z-index:2;pointer-events:none;
}
.eq-bar{
  width:3px;border-radius:2px 2px 0 0;
  background:linear-gradient(to top,var(--petal),var(--sun2));
  height:3px;
  transition:height 0.1s ease;
  opacity:0.5;
}

/* ── Stage ── */
#stage{
  position:relative;z-index:3;
  width:100vw;height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}

/* ── Lyric wrap ── */
#lyric-wrap{
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  pointer-events:none;
  gap:0.9rem;
  padding:5rem 1.2rem 7rem;
}

/* ── Lyric lines ── */
.lyric-line{
  font-size:clamp(1.5rem,7vw,2.4rem);
  font-weight:700;
  letter-spacing:0.1em;
  text-align:center;
  width:100%;
  padding:0 0.5rem;
  transition:opacity 0.3s,transform 0.3s;
  line-height:1.5;
  word-break:break-word;
  overflow-wrap:break-word;
}
.lyric-line.current{
  color:#fff8e1;
  text-shadow:0 0 18px var(--sun2), 0 0 45px var(--petal), 0 0 3px #fff;
  animation:pulse-lyric 0.45s ease;
}
.lyric-line.prev{
  color:var(--muted);opacity:0.35;
  font-size:clamp(0.85rem,4vw,1.3rem);
  transform:translateY(-0.25em) scale(0.84);
}
.lyric-line.next{
  color:var(--muted);opacity:0.35;
  font-size:clamp(0.85rem,4vw,1.3rem);
  transform:translateY(0.25em) scale(0.84);
}
@keyframes pulse-lyric{
  0%{transform:scale(0.88);opacity:0}
  60%{transform:scale(1.06);opacity:1}
  100%{transform:scale(1)}
}

/* ── Char units ── */
.char-unit{
  display:inline-block;
  transition:color 0.06s,transform 0.12s,text-shadow 0.12s;
}
.char-unit.active{
  color:var(--sun3);
  text-shadow:0 0 10px var(--sun3),0 0 24px var(--petal),0 0 40px var(--sun1);
  transform:translateY(-5px) scale(1.15);
}
.char-unit.passed{
  color:#e6a820;
  opacity:0.75;
}

/* ── Beat indicator — sunflower shape ── */
#beat-indicator{
  position:fixed;
  top:1rem;right:1rem;
  width:14px;height:14px;
  border-radius:50%;
  background:var(--sun2);
  box-shadow:0 0 14px var(--sun2),0 0 30px var(--petal);
  opacity:0;z-index:10;
  transition:opacity 0.05s;
}
#beat-indicator.on{opacity:1}

/* ── Chord badge ── */
#chord-badge{
  position:fixed;
  bottom:5.5rem;left:50%;transform:translateX(-50%);
  font-size:0.72rem;letter-spacing:0.2em;
  color:var(--sun2);opacity:0;
  transition:opacity 0.2s;z-index:10;
  text-shadow:0 0 10px var(--petal);
  white-space:nowrap;
}
#chord-badge.visible{opacity:0.8}

/* ── Controls ── */
#controls{
  position:fixed;
  bottom:1rem;
  left:50%;transform:translateX(-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0.5rem;
  z-index:20;
  width:calc(100% - 2rem);
  max-width:420px;
  background:rgba(13,8,0,0.78);
  border:1px solid rgba(245,200,0,0.25);
  padding:0.65rem 0.9rem;
  border-radius:20px;
  backdrop-filter:blur(12px);
}
#btn-row{
  display:flex;gap:0.5rem;justify-content:center;width:100%;
}
.btn{
  background:transparent;
  border:1.5px solid var(--sun1);
  color:var(--sun1);
  font-family:inherit;
  font-size:0.68rem;
  letter-spacing:0.12em;
  padding:0.45rem 0.9rem;
  cursor:pointer;border-radius:16px;
  transition:background 0.2s,color 0.2s,box-shadow 0.2s;
  flex:1;min-height:40px;
}
.btn:hover,.btn:focus{
  background:var(--sun1);color:var(--bg);
  box-shadow:0 0 18px var(--sun1);outline:none;
}
.btn:active{background:var(--sun1);color:var(--bg);transform:scale(0.96);}
#song-select{
  background:rgba(26,16,0,0.85);
  border:1px solid rgba(245,200,0,0.3);
  color:var(--text);font-family:inherit;
  padding:0.45rem 0.7rem;
  border-radius:16px;cursor:pointer;
  width:100%;min-height:40px;font-size:16px;
}

/* ── Progress bar ── */
#progress-bar{
  position:fixed;bottom:0;left:0;
  height:3px;
  background:linear-gradient(90deg,var(--petal),var(--sun1),var(--sun3));
  width:0%;z-index:30;
  transition:width 0.25s linear;
  box-shadow:0 0 10px var(--sun2);
}

/* ── Info banner ── */
#info-banner{
  position:fixed;top:0.8rem;left:50%;
  transform:translateX(-50%);
  text-align:center;z-index:10;
  background:rgba(13,8,0,0.65);
  border:1px solid rgba(245,200,0,0.2);
  padding:0.3rem 1rem;
  border-radius:16px;
  backdrop-filter:blur(8px);
  max-width:calc(100% - 4rem);
}
#info-banner .label-top{
  font-size:0.55rem;letter-spacing:0.24em;
  color:var(--sun1);text-transform:uppercase;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#info-banner .song-name{
  font-size:0.85rem;color:#fff8e1;letter-spacing:0.08em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:60vw;
}

/* ── Loading ── */
#loading{
  position:fixed;inset:0;z-index:100;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1rem;
  background:var(--bg);transition:opacity 0.6s;
}
#loading.hidden{opacity:0;pointer-events:none}
.loader-ring{
  width:50px;height:50px;
  border:2.5px solid var(--surface);
  border-top-color:var(--sun2);
  border-right-color:var(--petal);
  border-radius:50%;
  animation:spin 0.75s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-size:0.72rem;color:var(--muted);letter-spacing:0.2em}

/* ── Beat ripple ── */
.ripple{
  position:fixed;border-radius:50%;
  border:1.5px solid var(--sun1);
  pointer-events:none;z-index:5;
  animation:ripple-out 0.9s ease forwards;
}
@keyframes ripple-out{
  from{width:6px;height:6px;opacity:0.85;transform:translate(-50%,-50%) scale(1)}
  to{width:160px;height:160px;opacity:0;transform:translate(-50%,-50%) scale(1)}
}

/* ── Song themes ── */
.song-theme-0{--sun1:#f5c800;--sun2:#ffdf00;--sun3:#fff176;--petal:#ff9500}
.song-theme-1{--sun1:#e0aa00;--sun2:#ffd54f;--sun3:#fff8e1;--petal:#e65100}
.song-theme-2{--sun1:#ffab40;--sun2:#ffca28;--sun3:#fff9c4;--petal:#ff6d00}
.song-theme-3{--sun1:#ff8f00;--sun2:#ffca28;--sun3:#fff176;--petal:#e65100}
.song-theme-4{--sun1:#fdd835;--sun2:#fff176;--sun3:#fffde7;--petal:#f57f17}
.song-theme-5{--sun1:#ff6f00;--sun2:#ffa000;--sun3:#ffca28;--petal:#bf360c}

/* ── Floating sunflower petals SVG ── */
#sunflower-svg{
  position:fixed;
  pointer-events:none;
  z-index:0;
  opacity:0;
  animation:none;
}

/* ════════ TABLET ≥ 600px ════════ */
@media(min-width:600px){
  #eq-wrap{height:52px;gap:3px}
  .eq-bar{width:4px}
  #lyric-wrap{padding:5.5rem 2.5rem 7.5rem;gap:1.1rem;}
  .lyric-line{font-size:clamp(1.8rem,4.5vw,3rem);letter-spacing:0.12em;}
  .lyric-line.prev,.lyric-line.next{font-size:clamp(1rem,2.5vw,1.7rem);}
  #beat-indicator{top:1.5rem;right:1.8rem;width:14px;height:14px;}
  #chord-badge{bottom:5.8rem;font-size:0.78rem;}
  #controls{
    flex-direction:row;flex-wrap:wrap;justify-content:center;
    width:auto;max-width:560px;padding:0.65rem 1rem;border-radius:30px;
    bottom:1.2rem;gap:0.6rem;
  }
  #btn-row{width:auto;flex:none;}
  .btn{flex:none;font-size:0.72rem;padding:0.48rem 1.1rem;min-height:36px;}
  #song-select{width:auto;max-width:240px;font-size:0.72rem;min-height:36px;}
  #info-banner{top:1.2rem;padding:0.35rem 1.2rem;border-radius:18px;}
  #info-banner .label-top{font-size:0.58rem;}
  #info-banner .song-name{font-size:0.95rem;max-width:70vw;}
}

/* ════════ DESKTOP ≥ 1024px ════════ */
@media(min-width:1024px){
  #eq-wrap{height:60px;gap:3px}
  .eq-bar{width:4px;opacity:0.55}
  #lyric-wrap{padding:6rem 4rem 8rem;gap:1.4rem;}
  .lyric-line{font-size:clamp(2rem,4vw,3.8rem);letter-spacing:0.14em;padding:0 2.5rem;}
  .lyric-line.prev,.lyric-line.next{font-size:clamp(1rem,2vw,1.9rem);}
  #beat-indicator{top:2rem;right:2.5rem;width:16px;height:16px;}
  #chord-badge{bottom:6rem;font-size:0.82rem;letter-spacing:0.22em;}
  #controls{
    flex-direction:row;flex-wrap:nowrap;width:auto;max-width:none;
    padding:0.7rem 1.4rem;border-radius:40px;bottom:1.6rem;gap:0.9rem;
  }
  .btn{font-size:0.72rem;padding:0.48rem 1.2rem;min-height:unset;}
  #song-select{font-size:0.72rem;max-width:260px;min-height:unset;}
  #info-banner{top:1.4rem;padding:0.4rem 1.4rem;border-radius:20px;}
  #info-banner .label-top{font-size:0.6rem;letter-spacing:0.28em;}
  #info-banner .song-name{font-size:1rem;max-width:none;}
  .char-unit.active{transform:translateY(-5px) scale(1.15);}
}
</style>
</head>

<script>
const SONGS = {
  "6W2N":{name:"こたえて / imie",url:"https://piapro.jp/t/6W2N/20251215164617",theme:0,video:{beatId:4827293,chordId:2963754,repetitiveSegmentId:3086261,lyricId:126519,lyricDiffId:28645}},
  "zoqO":{name:"アフター・ザ・カーテン / Rulmry",url:"https://piapro.jp/t/zoqO/20251214200738",theme:1,video:{beatId:4827294,chordId:2963755,repetitiveSegmentId:3086262,lyricId:126591,lyricDiffId:28627}},
  "PNpQ":{name:"シャッターチャンス / 夜未アガリ",url:"https://piapro.jp/t/PNpQ/20251209170719",theme:2,video:{beatId:4827295,chordId:2963756,repetitiveSegmentId:3086263,lyricId:126542,lyricDiffId:28628}},
  "B3yJ":{name:"世界最後の音楽隊 / 夏山よつぎ×ど～ぱみん",url:"https://piapro.jp/t/B3yJ/20251215061727",theme:3,video:{beatId:4827296,chordId:2963757,repetitiveSegmentId:3086264,lyricId:126594,lyricDiffId:28629}},
  "QBdL":{name:"トリツクロジー / 鶴三",url:"https://piapro.jp/t/QBdL/20251215094303",theme:4,video:{beatId:4827297,chordId:2963758,repetitiveSegmentId:3086265,lyricId:126593,lyricDiffId:28630}},
  "E2i3":{name:"TAKEOVER / Twinfield",url:"https://piapro.jp/t/E2i3/20251215092113",theme:5,video:{beatId:4827298,chordId:2963759,repetitiveSegmentId:3086266,lyricId:126533,lyricDiffId:28631}}
};

const $loading  = document.getElementById('loading');
const $songTitle= document.getElementById('song-title');
const $prev     = document.getElementById('lyric-prev');
const $current  = document.getElementById('lyric-current');
const $next     = document.getElementById('lyric-next');
const $beat     = document.getElementById('beat-indicator');
const $chord    = document.getElementById('chord-badge');
const $progress = document.getElementById('progress-bar');
const $songSel  = document.getElementById('song-select');
const $play     = document.getElementById('btn-play');
const $pause    = document.getElementById('btn-pause');
const $stop     = document.getElementById('btn-stop');
const $eqWrap   = document.getElementById('eq-wrap');

let player = null;
let phrases = [];
let currentPhraseIdx = -1;
let charMaps = [];

/* ── EQ ── */
function getEqCount(){const w=window.innerWidth;if(w>=1024)return 48;if(w>=600)return 32;return 20;}
function buildEqBars(){$eqWrap.innerHTML='';const n=getEqCount();for(let i=0;i<n;i++){const b=document.createElement('div');b.className='eq-bar';$eqWrap.appendChild(b);}}
buildEqBars();
window.addEventListener('resize',buildEqBars);
const eqBars=()=>document.querySelectorAll('.eq-bar');
let eqAnim=null;
function animateEq(){eqBars().forEach(b=>{b.style.height=(4+Math.random()*46)+'px';});eqAnim=requestAnimationFrame(animateEq);}
function stopEq(){if(eqAnim){cancelAnimationFrame(eqAnim);eqAnim=null;}eqBars().forEach(b=>b.style.height='4px');}

/* ── Falling Sunflower Petals ── */
(function(){
  const canvas=document.getElementById('petals-canvas');
  const ctx=canvas.getContext('2d');
  let W,H,petals=[];

  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}

  // Draw a single sunflower petal (elongated oval)
  function drawPetal(ctx, x, y, size, angle, color, alpha){
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.translate(x,y);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.ellipse(0,-size*0.5, size*0.22, size*0.5, 0, 0, Math.PI*2);
    ctx.fillStyle=color;
    ctx.shadowColor=color;
    ctx.shadowBlur=6;
    ctx.fill();
    ctx.restore();
  }

  // Small sunflower icon
  function drawSunflower(ctx, x, y, r, angle, alpha){
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.translate(x,y);
    ctx.rotate(angle);
    const petCount=12;
    const colors=['#f5c800','#ff9500','#ffdf00','#ff6f00'];
    for(let i=0;i<petCount;i++){
      const a=(i/petCount)*Math.PI*2;
      ctx.save();
      ctx.rotate(a);
      ctx.beginPath();
      ctx.ellipse(0,-(r*0.85), r*0.22, r*0.52, 0, 0, Math.PI*2);
      ctx.fillStyle=colors[i%colors.length];
      ctx.fill();
      ctx.restore();
    }
    // center disc
    ctx.beginPath();
    ctx.arc(0,0,r*0.35,0,Math.PI*2);
    ctx.fillStyle='#3e2000';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(0,0,r*0.22,0,Math.PI*2);
    ctx.fillStyle='#5c3000';
    ctx.fill();
    ctx.restore();
  }

  function mkPetal(){
    const isSunflower=Math.random()<0.15;
    return{
      x:Math.random()*W,
      y:Math.random()*-200,
      size: isSunflower ? (14+Math.random()*18) : (8+Math.random()*14),
      vx:(Math.random()-0.5)*0.6,
      vy:0.5+Math.random()*0.9,
      angle:Math.random()*Math.PI*2,
      vAngle:(Math.random()-0.5)*0.025,
      alpha:0.5+Math.random()*0.5,
      color:['#f5c800','#ff9500','#ffdf00','#ff6f00','#ffe082'][Math.floor(Math.random()*5)],
      isSunflower,
      sway:Math.random()*0.4,
      swayOffset:Math.random()*Math.PI*2,
      t:0
    };
  }

  function init(){resize();petals=Array.from({length:40},mkPetal);}

  function draw(){
    ctx.clearRect(0,0,W,H);
    petals.forEach((p,i)=>{
      p.t+=0.02;
      p.x+=p.vx+Math.sin(p.t+p.swayOffset)*p.sway;
      p.y+=p.vy;
      p.angle+=p.vAngle;
      if(p.isSunflower){
        drawSunflower(ctx,p.x,p.y,p.size,p.angle,p.alpha);
      } else {
        drawPetal(ctx,p.x,p.y,p.size,p.angle,p.color,p.alpha);
      }
      if(p.y>H+40){petals[i]=mkPetal();}
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);
  init();draw();
})();

/* ── Binary rain (very subtle) ── */
(function(){
  const canvas=document.getElementById('bin-canvas');
  const ctx=canvas.getContext('2d');
  let W,H,cols,drops=[];
  const FS=13;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;cols=Math.floor(W/FS);drops=Array.from({length:cols},()=>Math.random()*H/FS|0);}
  function draw(){
    ctx.fillStyle='rgba(13,8,0,0.04)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#f5c800';ctx.font=FS+'px monospace';
    for(let i=0;i<drops.length;i++){
      ctx.globalAlpha=Math.random()*0.3+0.05;
      ctx.fillText(Math.random()>0.5?'1':'0',i*FS,drops[i]*FS);
      if(drops[i]*FS>H&&Math.random()>0.975)drops[i]=0;
      drops[i]++;
    }
    ctx.globalAlpha=1;
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);
  resize();draw();
})();

/* ── Beat ripple (warm sun color) ── */
function spawnRipple(){
  const el=document.createElement('div');
  el.className='ripple';
  el.style.left=(15+Math.random()*70)+'vw';
  el.style.top=(20+Math.random()*60)+'vh';
  el.style.borderColor=`hsl(${40+Math.random()*30},100%,60%)`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),950);
}

/* ── Phrase / char helpers ── */
function buildPhraseHtml(text){
  if(!text)return'';
  return[...text].map((ch,i)=>`<span class="char-unit" data-idx="${i}">${ch===' '?'&nbsp;':ch}</span>`).join('');
}
function buildCharMap(phrase){
  const fullText=phrase.text||'';
  const timings=new Array([...fullText].length).fill(null);
  let charPos=0;
  let w=phrase.firstWord;
  while(w){
    const wordChars=[...(w.text||'')];
    const fullChars=[...fullText];
    let wStart=-1;
    for(let i=charPos;i<=fullChars.length-wordChars.length;i++){
      let match=true;
      for(let k=0;k<wordChars.length;k++){if(fullChars[i+k]!==wordChars[k]){match=false;break;}}
      if(match){wStart=i;break;}
    }
    if(wStart>=0){
      charPos=wStart;
      let c=w.firstChar;let cOffset=0;
      while(c){
        const cLen=[...(c.text||'')].length;
        for(let k=0;k<cLen;k++){if(charPos+cOffset+k<timings.length){timings[charPos+cOffset+k]={startTime:c.startTime,endTime:c.endTime};}}
        cOffset+=cLen;c=c.next;
      }
      charPos+=wordChars.length;
    }
    w=w.next;
  }
  return timings;
}
function updatePhrase(idx){
  if(idx===currentPhraseIdx)return;
  currentPhraseIdx=idx;
  $prev.innerHTML   =phrases[idx-1]?.text?buildPhraseHtml(phrases[idx-1].text):'';
  $current.innerHTML=phrases[idx]?.text  ?buildPhraseHtml(phrases[idx].text)  :'';
  $next.innerHTML   =phrases[idx+1]?.text?buildPhraseHtml(phrases[idx+1].text):'';
}
function highlightChars(pos,phraseIdx){
  const timings=charMaps[phraseIdx];
  if(!timings)return;
  const spans=document.querySelectorAll('#lyric-current .char-unit');
  spans.forEach((el,i)=>{
    const t=timings[i];
    if(!t){el.classList.remove('active','passed');return;}
    if(pos>=t.startTime&&pos<t.endTime){el.classList.add('active');el.classList.remove('passed');}
    else if(pos>=t.endTime){el.classList.remove('active');el.classList.add('passed');}
    else{el.classList.remove('active','passed');}
  });
}
function clearHighlight(){document.querySelectorAll('#lyric-current .char-unit').forEach(el=>el.classList.remove('active','passed'));}

function applySongTheme(key){
  const t=SONGS[key]?.theme??0;
  document.body.className='song-theme-'+t;
}

/* ── Player ── */
function initPlayer(){
  const {Player}=TextAliveApp;
  player=new Player({
    app:{token:"E96Wa5egutbj0ueY"},
    mediaElement:document.createElement('audio'),
    mediaBannerPosition:'top left'
  });
  player.addListener({
    onAppReady(app){
      if(!app.managed)loadSong($songSel.value);
      $loading.classList.add('hidden');
    },
    onVideoReady(v){
      phrases=[];charMaps=[];
      let p=v.firstPhrase;
      while(p){phrases.push(p);charMaps.push(buildCharMap(p));p=p.next;}
      currentPhraseIdx=-1;
      $current.innerHTML='♪';$prev.innerHTML='';$next.innerHTML='';
    },
    onTimerReady(){$songTitle.textContent=SONGS[$songSel.value]?.name||'—';},
    onTimeUpdate(pos){
      if(!player.video)return;
      const dur=player.video.duration;
      if(dur>0)$progress.style.width=((pos/dur)*100)+'%';
      let found=-1;
      for(let i=0;i<phrases.length;i++){if(pos>=phrases[i].startTime&&pos<phrases[i].endTime){found=i;break;}}
      if(found>=0){updatePhrase(found);highlightChars(pos,found);}
      else clearHighlight();
    },
    onBeat(beat){
      $beat.classList.add('on');
      spawnRipple();
      setTimeout(()=>{$beat.classList.remove('on');},130);
    },
    onChord(chord){
      if(chord?.name){
        $chord.textContent=chord.name;$chord.classList.add('visible');
        clearTimeout($chord._t);
        $chord._t=setTimeout(()=>$chord.classList.remove('visible'),1300);
      }
    },
    onPlay(){animateEq()},
    onPause(){stopEq()},
    onStop(){
      stopEq();$progress.style.width='0%';
      $current.innerHTML='♪';$prev.innerHTML='';$next.innerHTML='';
      clearHighlight();
    }
  });
}

function loadSong(key){
  const song=SONGS[key];
  if(!song||!player)return;
  applySongTheme(key);
  $songTitle.textContent=song.name;
  $loading.classList.remove('hidden');
  player.createFromSongUrl(song.url,{video:song.video})
    .then(()=>$loading.classList.add('hidden'))
    .catch(err=>{console.error(err);$loading.classList.add('hidden');});
}

$play.addEventListener('click', ()=>player?.requestPlay());
$pause.addEventListener('click',()=>player?.requestPause());
$stop.addEventListener('click', ()=>player?.requestStop());
$songSel.addEventListener('change',()=>{player?.requestStop();loadSong($songSel.value);});

initPlayer();
</script>
